name: release-data-migrator

on:
  push:
    tags:
      - 'v*'
    branches: ['**']
    paths:
      - 'data-migrator/**'
      - '**/migrations/**'                          # rebuild when any service's SQL changes
      - '.github/workflows/release-data-migrator.yml'
      - '.github/workflows/reusable-*.yml'
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish to GHCR (true) or verify build only (false)'
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

jobs:
  test:
    uses: ./.github/workflows/reusable-test.yml
    with:
      service-path: data-migrator
      stack: chart-only

  build:
    needs: test
    uses: ./.github/workflows/reusable-build.yml
    secrets: inherit
    with:
      service-path: data-migrator
      dockerfile: Dockerfile
      context: '..'                                 # monorepo root: Dockerfile needs to see all */migrations/**
      image-name: core-data-migrator
      version: ${{ needs.test.outputs.version }}
      publish: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish) }}

  chart:
    needs: [test, build]
    uses: ./.github/workflows/reusable-chart.yml
    with:
      service-path: data-migrator
      chart-path: helm/core-data-migrator
      chart-name: core-data-migrator
      version: ${{ needs.test.outputs.version }}
      publish: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish) }}
