name: ci-adp-vega

# Compile gate for PRs touching adp/vega. Build-only for now: many services'
# unit tests assume a working directory / locale paths and fatal-exit under a
# plain `go test ./...`. Add `go test` here once the test harness is CI-ready.

on:
  pull_request:
    paths:
      - 'adp/vega/**'
      - '.github/workflows/ci-adp-vega.yml'

concurrency:
  group: ci-adp-vega-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: adp/vega/vega-backend/server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: adp/vega/vega-backend/server/go.mod
      - run: go build ./...
      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.6.2
          working-directory: adp/vega/vega-backend/server
