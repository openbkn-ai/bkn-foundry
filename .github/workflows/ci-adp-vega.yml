name: ci-adp-vega

# VEGA Backend PR gate: lint, unit tests, coverage and build.

on:
  pull_request:
    paths:
      - 'adp/vega/**'
      - '.github/actions/golangci-lint/**'
      - '.github/workflows/ci-adp-vega.yml'

concurrency:
  group: ci-adp-vega-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: adp/vega/vega-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: adp/vega/vega-backend/server/go.mod

      - name: 静态检查
        uses: ./.github/actions/golangci-lint
        with:
          working-directory: adp/vega/vega-backend/server

      - name: 单元测试与覆盖率
        run: make test-cover COVERAGE_THRESHOLD=0

      - name: 构建
        run: cd server && go build ./...

      - name: 上传覆盖率产物
        uses: actions/upload-artifact@v4
        with:
          name: vega-backend-coverage
          path: |
            adp/vega/vega-backend/test-result/coverage.out
            adp/vega/vega-backend/test-result/coverage.html
            adp/vega/vega-backend/test-result/coverage.xml
