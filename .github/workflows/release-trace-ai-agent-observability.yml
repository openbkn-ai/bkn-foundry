name: release-trace-ai-agent-observability

on:
  push:
    tags:
      - 'v*'
    branches: ['**']
    paths:
      - 'trace-ai/agent-observability/**'
      - '.github/workflows/release-trace-ai-agent-observability.yml'
      - '.github/workflows/reusable-*.yml'
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish to GHCR (true) or verify build only (false)'
        type: boolean
        default: false
permissions:
  contents: read
  packages: write

jobs:
  test:
    uses: ./.github/workflows/reusable-test.yml
    with:
      service-path: trace-ai/agent-observability
      stack: go
      go-mod-file: go.mod

  build:
    needs: test
    uses: ./.github/workflows/reusable-build.yml
    secrets: inherit
    with:
      service-path: trace-ai/agent-observability
      dockerfile: Dockerfile
      context: '.'
      image-name: agent-observability
      version: ${{ needs.test.outputs.version }}
      publish: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish) }}

  chart:
    needs: [test, build]
    uses: ./.github/workflows/reusable-chart.yml
    with:
      service-path: trace-ai/agent-observability
      chart-path: charts/agent-observability
      chart-name: agent-observability
      version: ${{ needs.test.outputs.version }}
      publish: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish) }}
