name: ci-infra-oss-gateway

# Compile gate for PRs touching infra/oss-gateway-backend. Build-only for now;
# add `go test` once the test harness is CI-ready.

on:
  pull_request:
    paths:
      - 'infra/oss-gateway-backend/**'
      - '.github/workflows/ci-infra-oss-gateway.yml'

concurrency:
  group: ci-infra-oss-gateway-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/oss-gateway-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: infra/oss-gateway-backend/go.mod
      - run: go build ./...
