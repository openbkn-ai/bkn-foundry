name: release-adp-ontology-query

on:
  push:
    tags:
      - 'v*'
    branches: ['**']
    paths:
      - 'adp/bkn/ontology-query/**'
      - '.github/workflows/release-adp-ontology-query.yml'
      - '.github/workflows/reusable-*.yml'
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish to GHCR (true) or verify build only (false)'
        type: boolean
        default: false
permissions:
  contents: read
  packages: write

jobs:
  test:
    uses: ./.github/workflows/reusable-test.yml
    with:
      service-path: adp/bkn/ontology-query
      stack: chart-only

  build:
    needs: test
    uses: ./.github/workflows/reusable-build.yml
    secrets: inherit
    with:
      service-path: adp/bkn/ontology-query
      dockerfile: docker/Dockerfile
      context: '.'
      image-name: ontology-query
      version: ${{ needs.test.outputs.version }}
      build-args: |
        SERVER_VERSION=${{ needs.test.outputs.version }}
      publish: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish) }}

  chart:
    needs: [test, build]
    uses: ./.github/workflows/reusable-chart.yml
    with:
      service-path: adp/bkn/ontology-query
      chart-path: helm/ontology-query
      chart-name: ontology-query
      version: ${{ needs.test.outputs.version }}
      publish: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish) }}
