name: reusable-build

on:
  workflow_call:
    inputs:
      service-path:
        type: string
        required: true
      dockerfile:
        type: string
        required: true
        description: 'Path to Dockerfile'
      context:
        type: string
        default: '.'
        description: 'Docker build context (relative to service-path)'
      platforms:
        type: string
        default: 'linux/amd64,linux/arm64'
        description: 'Docker platforms'
      image-name:
        type: string
        required: true
        description: 'Image name (without registry/tag)'
      version:
        type: string
        required: true
      publish:
        type: boolean
        default: false
    secrets:
      SWR_USERNAME:
        required: false
      SWR_PASSWORD:
        required: false

env:
  SWR_REGISTRY: swr.cn-east-3.myhuaweicloud.com
  SWR_ORGANIZATION: kweaver-ai

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Login to SWR
        if: ${{ inputs.publish }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.SWR_REGISTRY }}
          username: ${{ secrets.SWR_USERNAME }}
          password: ${{ secrets.SWR_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.service-path }}/${{ inputs.context }}
          file: ${{ inputs.service-path }}/${{ inputs.dockerfile }}
          platforms: ${{ inputs.platforms }}
          push: ${{ inputs.publish }}
          provenance: false
          sbom: false
          tags: ${{ env.SWR_REGISTRY }}/${{ env.SWR_ORGANIZATION }}/${{ inputs.image-name }}:${{ inputs.version }}
