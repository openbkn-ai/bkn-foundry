name: ci-trace-ai

# Compile gate for PRs touching trace-ai. Build-only for now; add `go test`
# once the test harness is CI-ready.

on:
  pull_request:
    paths:
      - 'trace-ai/**'
      - '.github/workflows/ci-trace-ai.yml'

concurrency:
  group: ci-trace-ai-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: trace-ai/agent-observability
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: trace-ai/agent-observability/go.mod
      - run: go build ./...
