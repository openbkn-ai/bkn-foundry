name: reusable-test

on:
  workflow_call:
    inputs:
      service-path:
        type: string
        required: true
        description: 'Service directory (e.g., bkn-trace/agent-observability)'
      stack:
        type: string
        required: true
        description: 'go | python | chart-only'
      go-mod-file:
        type: string
        default: 'go.mod'
        description: 'Path to go.mod relative to service dir'
      python-version:
        type: string
        default: '3.11'
        description: 'Python version for setup'
      test-flags:
        type: string
        default: ''
        description: 'Extra flags for go test (e.g. -skip <pattern>)'
      skip-lint:
        type: boolean
        default: false
        description: 'Skip golangci-lint (for services with incompatible lint config)'
    outputs:
      version:
        value: ${{ jobs.resolve-version.outputs.version }}
        description: 'Resolved version string'

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: version
        shell: bash
        run: |
          set -euo pipefail

          # Single source of truth: repo-root VERSION (shared by all services)
          BASE_VERSION="$(tr -d '[:space:]' < VERSION)"
          REF_NAME="${{ github.ref_name }}"
          REF_TYPE="${{ github.ref_type }}"
          SHORT_SHA="$(git rev-parse --short=7 HEAD)"

          if [[ "$REF_TYPE" == "tag" ]]; then
            # Tag push (e.g. v0.1.1-alpha) cuts a release: the tag IS the version
            # (leading "v" stripped). This is what makes `git push` a tag publish a
            # clean, immutable image/chart set across all services.
            VERSION="${REF_NAME#v}"
          elif [[ "$REF_NAME" == release/* ]]; then
            VERSION="$BASE_VERSION"
          else
            SANITIZED_BRANCH="$(echo "$REF_NAME" | tr '[:upper:]' '[:lower:]' | sed -E 's#[^0-9a-zA-Z.-]+#-#g; s#-+#-#g; s#^[.-]+##; s#[.-]+$##')"
            # Embed the commit time (UTC, fixed-width YYYYMMDDHHMMSS) so the
            # prerelease is monotonically sortable as a plain string — picking
            # "newest" needs no resolving the sha against a local git history
            # (the old scheme silently mis-ordered on shallow/foreign checkouts).
            # Commit time, not build time, so CI re-runs stay reproducible.
            COMMIT_DATE="$(TZ=UTC git show -s --format=%cd --date=format-local:%Y%m%d%H%M%S HEAD)"
            VERSION="$BASE_VERSION-$SANITIZED_BRANCH.$COMMIT_DATE.sha$SHORT_SHA"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

  test:
    runs-on: ubuntu-latest
    needs: resolve-version
    outputs:
      version: ${{ needs.resolve-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Test (Go)
        if: ${{ inputs.stack == 'go' }}
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ inputs.service-path }}/${{ inputs.go-mod-file }}

      - name: Run Go test
        if: ${{ inputs.stack == 'go' }}
        working-directory: ${{ inputs.service-path }}
        run: go test ${{ inputs.test-flags }} ./...

      - name: GolangCI-Lint
        if: ${{ inputs.stack == 'go' && !inputs.skip-lint }}
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.6.2
          working-directory: ${{ inputs.service-path }}

      - name: Setup Python
        if: ${{ inputs.stack == 'python' }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Run Python test
        if: ${{ inputs.stack == 'python' }}
        working-directory: ${{ inputs.service-path }}
        run: |
          pip install -r requirements.txt
          # 单测专用依赖（pytest/httpx 等）不进运行镜像 requirements.txt，放 test-requirements.txt
          [ -f test-requirements.txt ] && pip install -r test-requirements.txt || true
          pytest

      - name: Setup Helm
        if: ${{ inputs.stack == 'chart-only' }}
        uses: azure/setup-helm@v4

      - name: Helm lint
        if: ${{ inputs.stack == 'chart-only' }}
        working-directory: ${{ inputs.service-path }}
        run: |
          # Chart-only services should have chart in specific subdirs
          find . -name Chart.yaml -type f | while read chart; do
            chart_dir=$(dirname "$chart")
            helm lint "$chart_dir"
          done
