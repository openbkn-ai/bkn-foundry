name: reusable-test

on:
  workflow_call:
    inputs:
      service-path:
        type: string
        required: true
        description: 'Service directory (e.g., trace-ai/agent-observability)'
      stack:
        type: string
        required: true
        description: 'go | python | chart-only'
      go-mod-file:
        type: string
        default: 'go.mod'
        description: 'Path to go.mod relative to service dir'
      python-version:
        type: string
        default: '3.11'
        description: 'Python version for setup'
    outputs:
      version:
        value: ${{ jobs.resolve-version.outputs.version }}
        description: 'Resolved version string'

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: version
        shell: bash
        run: |
          set -euo pipefail

          # Single source of truth: repo-root VERSION (shared by all services)
          BASE_VERSION="$(tr -d '[:space:]' < VERSION)"
          REF_NAME="${{ github.ref_name }}"
          SHORT_SHA="$(git rev-parse --short=7 HEAD)"

          if [[ "$REF_NAME" == release/* ]]; then
            VERSION="$BASE_VERSION"
          else
            SANITIZED_BRANCH="$(echo "$REF_NAME" | tr '[:upper:]' '[:lower:]' | sed -E 's#[^0-9a-zA-Z.-]+#-#g; s#-+#-#g; s#^[.-]+##; s#[.-]+$##')"
            VERSION="$BASE_VERSION-$SANITIZED_BRANCH.sha$SHORT_SHA"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

  test:
    runs-on: ubuntu-latest
    needs: resolve-version
    outputs:
      version: ${{ needs.resolve-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Test (Go)
        if: ${{ inputs.stack == 'go' }}
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ inputs.service-path }}/${{ inputs.go-mod-file }}

      - name: Run Go test
        if: ${{ inputs.stack == 'go' }}
        working-directory: ${{ inputs.service-path }}
        run: go test ./...

      - name: GolangCI-Lint
        if: ${{ inputs.stack == 'go' }}
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.6.2
          working-directory: ${{ inputs.service-path }}

      - name: Setup Python
        if: ${{ inputs.stack == 'python' }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Run Python test
        if: ${{ inputs.stack == 'python' }}
        working-directory: ${{ inputs.service-path }}
        run: |
          pip install -r requirements.txt
          pytest

      - name: Setup Helm
        if: ${{ inputs.stack == 'chart-only' }}
        uses: azure/setup-helm@v4

      - name: Helm lint
        if: ${{ inputs.stack == 'chart-only' }}
        working-directory: ${{ inputs.service-path }}
        run: |
          # Chart-only services should have chart in specific subdirs
          find . -name Chart.yaml -type f | while read chart; do
            chart_dir=$(dirname "$chart")
            helm lint "$chart_dir"
          done
