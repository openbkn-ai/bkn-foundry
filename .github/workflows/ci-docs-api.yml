name: ci-docs-api

# API 文档流水线：
#  - PR 触碰 docs/api 时：校验 OpenAPI YAML（$ref 可解析等），渲染 Markdown，
#    若 _generated/*.md 与源 YAML 不同步就提交回 PR 分支。
#  - push 到 main 后：渲染交互式 HTML（redocly）并发布到 GitHub Pages，供开发者
#    在线查看（HTML 不进 git，见 .gitignore）。
#
# 真相源永远是 YAML；_generated/ 的 md 由本流水线维护，不要手改。
#
# 前置：GitHub Pages 发布需在仓库 Settings → Pages 里把 Source 设为
# "GitHub Actions"（一次性设置）。

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'docs/api/**'
      - 'package.json'
      - 'package-lock.json'
      - 'Makefile'
      - '.redocly.yaml'
      - '.github/workflows/ci-docs-api.yml'
  push:
    branches: [main]
    paths:
      - 'docs/api/**'
      - 'package.json'
      - 'package-lock.json'
      - 'Makefile'
      - '.redocly.yaml'
      - '.github/workflows/ci-docs-api.yml'

concurrency:
  group: ci-docs-api-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write   # 需要把渲染出的 md 提交回 PR 分支
  pages: write      # 发布 GitHub Pages
  id-token: write   # Pages 部署需要

jobs:
  render:
    # PR 时渲染 md 并回提交
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ github.token }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install doc toolchain
        run: npm ci || npm install

      - name: Lint OpenAPI YAML
        run: make api-docs-lint

      - name: Render YAML to Markdown
        run: make api-docs

      - name: Commit regenerated Markdown if changed
        run: |
          set -euo pipefail
          if [ -z "$(git status --porcelain docs/api/_generated)" ]; then
            echo "✅ _generated/ already in sync — nothing to commit."
            exit 0
          fi
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add docs/api/_generated
          git commit -m 'docs(api): regenerate Markdown from OpenAPI YAML'
          git push origin HEAD:${{ github.head_ref }}
          echo "📝 Committed regenerated Markdown back to the PR branch."

  pages:
    # push 到 main 后渲染 HTML 并发布 Pages
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install doc toolchain
        run: npm ci || npm install

      - name: Render interactive HTML
        run: make api-docs-html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/api/_generated/html

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
