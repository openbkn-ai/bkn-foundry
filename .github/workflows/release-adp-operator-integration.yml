name: release-adp-operator-integration

on:
  push:
    branches: ['**']
    paths:
      - 'adp/execution-factory/operator-integration/**'
      - '.github/workflows/release-adp-operator-integration.yml'
      - '.github/workflows/reusable-*.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  test:
    uses: ./.github/workflows/reusable-test.yml
    with:
      service-path: adp/execution-factory/operator-integration
      stack: chart-only

  build:
    needs: test
    uses: ./.github/workflows/reusable-build.yml
    with:
      service-path: adp/execution-factory/operator-integration
      dockerfile: docker/Dockerfile
      context: '.'
      image-name: agent-operator-integration
      version: ${{ needs.test.outputs.version }}
      publish: ${{ github.event_name == 'push' }}

  chart:
    needs: [test, build]
    uses: ./.github/workflows/reusable-chart.yml
    with:
      service-path: adp/execution-factory/operator-integration
      chart-path: helm/agent-operator-integration
      chart-name: agent-operator-integration
      version: ${{ needs.test.outputs.version }}
      publish: ${{ github.event_name == 'push' }}
