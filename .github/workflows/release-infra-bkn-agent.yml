name: release-infra-bkn-agent

# 平台内置 Agent 运行时 bkn-agent（Epic #202）。Python / LangGraph 服务。
# test stack = python：跑 app/test 全量单测（回归门禁）。单测专用依赖在
# test-requirements.txt（reusable-test 检测到就装，不进运行镜像 requirements.txt）。
# 镜像 FROM python:3.12-slim（reusable-build 多架构：linux/amd64,linux/arm64）。

on:
  push:
    tags:
      - 'v*'
    branches: ['**']
    paths:
      - 'infra/bkn-agent/**'
      - '.github/workflows/release-infra-bkn-agent.yml'
      - '.github/workflows/reusable-*.yml'
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish to GHCR (true) or verify build only (false)'
        type: boolean
        default: false
permissions:
  contents: read
  packages: write

jobs:
  test:
    uses: ./.github/workflows/reusable-test.yml
    with:
      service-path: infra/bkn-agent
      stack: python
      python-version: '3.12'

  build:
    needs: test
    uses: ./.github/workflows/reusable-build.yml
    secrets: inherit
    with:
      service-path: infra/bkn-agent
      dockerfile: Dockerfile
      context: '.'
      image-name: bkn-agent
      version: ${{ needs.test.outputs.version }}
      publish: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish) }}

  chart:
    needs: [test, build]
    uses: ./.github/workflows/reusable-chart.yml
    with:
      service-path: infra/bkn-agent
      chart-path: charts
      chart-name: bkn-agent
      version: ${{ needs.test.outputs.version }}
      publish: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish) }}
