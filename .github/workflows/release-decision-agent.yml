name: release-decision-agent

on:
  push:
    branches: ['**']
    paths:
      - 'decision-agent/**'
      - '.github/workflows/release-decision-agent.yml'
      - '.github/workflows/reusable-*.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  test:
    uses: ./.github/workflows/reusable-test.yml
    with:
      service-path: decision-agent/agent-backend/agent-factory
      stack: go
      go-mod-file: go.mod

  # Single unified image: multi-stage Dockerfile builds agent-factory (Go),
  # agent-executor (Python) and agent-memory (Python), run via supervisor.
  build:
    needs: test
    uses: ./.github/workflows/reusable-build.yml
    with:
      service-path: decision-agent/agent-backend
      dockerfile: deploy/docker/Dockerfile
      context: '.'
      image-name: agent-backend
      version: ${{ needs.test.outputs.version }}
      publish: ${{ github.event_name == 'push' }}

  chart:
    needs: [test, build]
    uses: ./.github/workflows/reusable-chart.yml
    with:
      service-path: decision-agent/agent-backend/deploy
      chart-path: helm/agent-backend
      chart-name: agent-backend
      version: ${{ needs.test.outputs.version }}
      publish: ${{ github.event_name == 'push' }}
