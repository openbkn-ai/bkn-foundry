name: release-trace-ai-otelcol

# Chart-only. Deploys upstream opentelemetry-collector-contrib (values.yaml left
# pointing upstream, not a first-party GHCR image).

on:
  push:
    branches: ['**']
    paths:
      - 'trace-ai/otelcol-contribute-chart/**'
      - '.github/workflows/release-trace-ai-otelcol.yml'
      - '.github/workflows/reusable-*.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  test:
    uses: ./.github/workflows/reusable-test.yml
    with:
      service-path: trace-ai/otelcol-contribute-chart
      stack: chart-only

  chart:
    needs: test
    uses: ./.github/workflows/reusable-chart.yml
    with:
      service-path: trace-ai/otelcol-contribute-chart
      chart-path: charts/otelcol-contrib
      chart-name: otelcol-contrib
      version: ${{ needs.test.outputs.version }}
      publish: ${{ github.event_name == 'push' }}
