name: 本地 GolangCI-Lint
description: 使用仓库统一版本运行 golangci-lint

inputs:
  working-directory:
    description: Go 模块工作目录
    required: true
  version:
    description: golangci-lint 版本
    required: false
    default: v2.12.2

runs:
  using: composite
  steps:
    - name: 运行 GolangCI-Lint
      uses: golangci/golangci-lint-action@v7
      with:
        version: ${{ inputs.version }}
        working-directory: ${{ inputs.working-directory }}
