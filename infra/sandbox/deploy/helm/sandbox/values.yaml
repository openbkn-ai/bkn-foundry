# Default values for sandbox-platform Helm chart

namespace: openbkn
imagePullPolicy: IfNotPresent
imagePullSecrets: []
image:
  registry: "ghcr.io/openbkn-ai"
  controlPlane:
    repository: sandbox-control-plane
    tag: "__VERSION__"
    pullPolicy: IfNotPresent
  defaultTemplates:
    pythonBasic:
      repository: sandbox-template-python-basic
      tag: "__VERSION__"
      pullPolicy: IfNotPresent
    multiLanguage:
      repository: sandbox-template-multi-language
      tag: "__VERSION__"
      pullPolicy: IfNotPresent
  # Deprecated: use image.defaultTemplates.pythonBasic instead.
  defaultTemplate:
    repository: sandbox-template-python-basic
    tag: "__VERSION__"
    pullPolicy: IfNotPresent
  minio:
    repository: minio
    tag: "RELEASE.2025-09-07T16-13-09Z"
    pullPolicy: IfNotPresent

# Control Plane configuration
controlPlane:
  enabled: true
  replicaCount: 1

  service:
    type: ClusterIP
    port: 8000
    annotations: {}

  # Internal execution backend — callers reach it via the cluster service
  # (sandbox-control-plane:8000), not the gateway. The catch-all "/" ingress was
  # helm-template boilerplate and hijacked the gateway root from bkn-studio (the
  # web UI), so nginx admission rejected studio's own "/" ingress. Disabled.
  ingress:
    enabled: false
    className: "nginx"
    annotations: {}
    paths:
      - path: /
        pathType: Prefix
    tls: []

  # Resource limits and requests
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # Node selector
  nodeSelector: {}

  # Tolerations
  tolerations: []

  # Affinity
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app
                  operator: In
                  values:
                    - sandbox-control-plane
            topologyKey: kubernetes.io/hostname

  env:
    ENVIRONMENT: "staging"
    DEBUG: "false"
    DATABASE_URL: "mysql+aiomysql://root:password@mariadb.sandbox-system.svc.cluster.local:3306/sandbox"
    DEFAULT_TIMEOUT: "300"
    MAX_TIMEOUT: "3600"
    DEFAULT_CPU: "1"
    DEFAULT_MEMORY: "512Mi"
    DEFAULT_DISK: "1Gi"
    IDLE_THRESHOLD_MINUTES: "-1"
    MAX_LIFETIME_HOURS: "-1"
    CLEANUP_INTERVAL_SECONDS: "300"
    DISABLE_BWRAP: "true"
    PYTHONUNBUFFERED: "1"

  s3:
    # Note: endpointUrl is dynamically set in secret.yaml using .Values.namespace
    # The actual endpoint will be: http://minio.<namespace>.svc.cluster.local:9000
    endpointUrl: ""  # Dynamically generated from namespace
    bucket: "sandbox-workspace"
    region: "us-east-1"
# MinIO configuration
minio:
  enabled: true
  replicaCount: 1

  service:
    type: ClusterIP
    apiPort: 9000
    consolePort: 9001
    annotations: {}

  ingress:
    enabled: true
    className: "class-443"
    annotations: {}
    paths:
      - path: /
        pathType: ImplementationSpecific

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  persistence:
    enabled: true
    storageClass: ""
    accessMode: ReadWriteOnce
    size: 10Gi

  defaultBuckets:
    - sandbox-workspace

  auth:
    rootUser: "minioadmin"
    rootPassword: "minioadmin"

  nodeSelector: {}
  tolerations: []

# ServiceAccount configuration
serviceAccount:
  create: true
  name: "sandbox-control-plane"
  annotations: {}

# RBAC configuration
rbac:
  create: true
  name: "sandbox-control-plane"

# ConfigMap configuration
configMap:
  create: true
  name: "sandbox-config"

secret:
  create: true
  name: "sandbox-secrets"
  s3:
    accessKeyId: "minioadmin"
    secretAccessKey: "minioadmin"
    region: "us-east-1"


# Pod security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

# Container security context
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false


depServices:
  class-443:
    ingressClass: class-443
  # 数据库连接配置
  rds:
    type: MariaDB
    host: mariadb-mariadb-cluster.resource
    port: 3330
    hostRead: mariadb-mariadb-cluster.resource
    portRead: 3330
    user: anyshare
    password: xxx
    database: adp
    maxConnections: 30
    maxReadConnections: 30
    dbCharset: utf8mb4
    timeout: 10
    readTimeout: 10
    writeTimeout: 10
