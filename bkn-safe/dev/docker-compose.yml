# Dev stack for the ISF replacement — mirrors the production DB topology:
#   - hydra (upstream v26.2.0, UNMODIFIED) on PostgreSQL
#   - bkn-safe on MariaDB (via the openbkn-rds driver, like the rest of the stack)
#
# WHY two engines (decision 2026-06-03, after verifying on the VM):
#   - hydra does NOT run on MariaDB: its migration 20220513_string_slice_json
#     uses MySQL-only `CAST(... AS JSON)`, which MariaDB rejects (Error 1064;
#     MariaDB never implemented it — MDEV-26448). hydra officially supports
#     PostgreSQL / MySQL / CockroachDB. We pick PostgreSQL (hydra's first-class
#     backend; also eases a future xinchuang path since Kingbase is PG-based).
#   - bkn-safe's schema is plain (no CAST AS JSON), so it runs on the existing
#     MariaDB via openbkn-rds — no new engine for the app data.
#   - hydra v2.3.0 has NO device flow; device flow is in v26.x → pin v26.2.0.
#
# NOT a production deployment — local/VM dev scaffolding.
#
#   docker compose up -d --build     # postgres + mariadb + hydra + bkn-safe
#   ./seed-clients.sh                # register OAuth2 clients
#   ./validate.sh                    # client_credentials introspect + device smoke
#   ./validate-e2e.sh                # full authcode login/consent + introspect ext
#
# Hydra ports: 4444 public, 4445 admin. bkn-safe: 3000.

services:
  # hydra's OAuth2 metadata DB. PostgreSQL — hydra's first-class backend.
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: hydra
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: hydra
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hydra"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - hydra-pg:/var/lib/postgresql/data

  # bkn-safe's app DB. MariaDB — same engine as the rest of the Kowell stack;
  # bkn-safe connects via the openbkn-rds driver (xinchuang-transparent).
  mariadb:
    image: mariadb:11.4
    environment:
      MARIADB_ROOT_PASSWORD: secret
      MARIADB_DATABASE: safe
    ports:
      - "13306:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - safe-mariadb:/var/lib/mysql

  hydra-migrate:
    image: oryd/hydra:v26.2.0
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DSN: "postgres://hydra:secret@postgres:5432/hydra?sslmode=disable"
    command: migrate sql -e --yes
    restart: on-failure

  hydra:
    image: oryd/hydra:v26.2.0
    depends_on:
      hydra-migrate:
        condition: service_completed_successfully
    ports:
      - "4444:4444"   # public
      - "4445:4445"   # admin
    environment:
      DSN: "postgres://hydra:secret@postgres:5432/hydra?sslmode=disable"
      URLS_SELF_ISSUER: "http://127.0.0.1:4444"
      # login/consent/device provider = bkn-safe. The browser (host curl) is
      # redirected here; both host and provider share 127.0.0.1:3000.
      URLS_LOGIN: "http://127.0.0.1:3000/login"
      URLS_CONSENT: "http://127.0.0.1:3000/consent"
      URLS_DEVICE_VERIFICATION: "http://127.0.0.1:3000/device"
      SECRETS_SYSTEM: "this-is-a-dev-only-secret-change-me-32b"
      OAUTH2_EXPOSE_INTERNAL_ERRORS: "true"
      LOG_LEVEL: "info"
    command: serve all --dev
    restart: on-failure

  # bkn-safe: the ISF replacement auth service, wired as hydra's login/consent/
  # device provider. Built from the cross-compiled binary (see Dockerfile).
  # Reaches hydra admin over the compose network (hydra:4445); the browser is
  # redirected to 127.0.0.1:3000 (published), shared by host curl and provider.
  safe:
    build: .
    depends_on:
      mariadb:
        condition: service_healthy
      hydra:
        condition: service_started
    ports:
      - "3000:3000"
    environment:
      SAFE_HTTP_ADDR: ":3000"
      SAFE_DB_TYPE: "MySQL"
      SAFE_DB_USER: "root"
      SAFE_DB_PASSWORD: "secret"
      SAFE_DB_HOST: "mariadb"
      SAFE_DB_PORT: "3306"
      SAFE_DB_NAME: "safe"
      SAFE_HYDRA_ADMIN_URL: "http://hydra:4445"
      SAFE_HYDRA_PUBLIC_URL: "http://hydra:4444"
      GIN_MODE: "release"
    restart: on-failure

volumes:
  hydra-pg:        # persistent PostgreSQL data for the standing test hydra
  safe-mariadb:    # persistent MariaDB data for bkn-safe
