apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.image.name }}-secret
  namespace: {{ .Values.namespace }}
type: Opaque
stringData:
  # hydra reads DSN and SECRETS_SYSTEM from the environment; keep them out of the
  # ConfigMap.
  dsn: {{ .Values.config.dsn | quote }}
  secretsSystem: {{ .Values.config.secretsSystem | quote }}
