apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.image.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Values.image.name }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.ports.port }}
      targetPort: {{ .Values.service.ports.targetPort }}
      protocol: TCP
  selector:
    app: {{ .Values.image.name }}
---
{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.image.name }}-ingress
  namespace: {{ .Release.Namespace }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.ingressClass }}
  ingressClassName: {{ .Values.ingress.ingressClass }}
  {{- end }}
  rules:
    - http:
        paths:
          {{- /* bkn-safe-served provider UI pages (login/consent/device) */}}
          {{- range .Values.ingress.paths }}
          - path: {{ . }}
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ $.Values.image.name }}
                port:
                  number: {{ $.Values.service.ports.port }}
          {{- end }}
          {{- /* hydra public OAuth2/OIDC endpoints (token, device/auth, discovery, ...) */}}
          {{- range .Values.ingress.hydraPublicPaths }}
          - path: {{ . }}
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ $.Values.ingress.hydraPublicService }}
                port:
                  number: {{ $.Values.ingress.hydraPublicPort }}
          {{- end }}
{{- end }}
