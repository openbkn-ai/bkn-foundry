{{- /*
Sensitive configuration for bkn-safe. These were previously plain keys in the
config ConfigMap; ConfigMaps are readable under a far more freely granted RBAC
verb than Secrets and are commonly excluded from encryption-at-rest, so the
credentials are moved here. The non-sensitive keys stay in the ConfigMap.

Values are carried over verbatim from the same sources as before (shared cluster
RDS from depServices.rds, or the bundled dev DB), so this is a relocation, not a
value change — except SECRETS_SYSTEM, which is resolved by bkn-safe.hydraSecret
(random for fresh installs, preserved for existing ones).
*/ -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  {{- $rds := (.Values.depServices | default dict).rds | default dict }}
  {{- if $rds.host }}
  SAFE_DB_PASSWORD: {{ $rds.password | quote }}
  {{- else }}
  SAFE_DB_PASSWORD: {{ .Values.config.db.password | quote }}
  {{- end }}
  SAFE_LDAP_BIND_PASSWORD: {{ .Values.config.ldap.bindPassword | quote }}
  {{- if .Values.config.initialPassword }}
  BKN_SAFE_INITIAL_PASSWORD: {{ .Values.config.initialPassword | quote }}
  {{- end }}
  {{- if .Values.bundledDeps.enabled }}
  SECRETS_SYSTEM: {{ include "bkn-safe.hydraSecret" . | quote }}
  {{- end }}
