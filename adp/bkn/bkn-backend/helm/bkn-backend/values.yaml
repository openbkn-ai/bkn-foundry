namespace: openbkn
moduleName: bkn-backend

# 环境变量：语言/时区
env:
  timezone: Asia/Shanghai
  language: en_US.UTF-8

# bkn-safe (ISF replacement) cutover knobs. Default empty = ISF behavior.
# provider: "" | "shadow" | "bkn-safe". url: bkn-safe ClusterIP base. Revertible.
bknSafe:
  authzProvider: ""
  directoryProvider: ""
  url: ""

replicaCount: 1

# 节点选择器
nodeSelector: {}

image:
  registry: ghcr.io/openbkn-ai
  repository: bkn-backend
  tag: "__VERSION__"
  pullPolicy: IfNotPresent

service:
  bknBackend:
    type: ClusterIP
    port: 13014
    nodePort: 31014
    ingress:
      enabled: true
      interface:
        path:
          - /api/bkn-backend/v1
          - /api/ontology-manager/v1

# 反亲和性设置
antiAffinity:
  enabled: true
  rule: "soft" # 可选参数 hard, soft

# 认证开关
auth:
  enabled: true

# 业务域开关
businessDomain:
  enabled: true

# 微服务通信依赖配置
depServices:
  class-443:
    ingressClass: class-443
  rds:
    host: mariadb-mariadb-master.resource.svc.cluster.local.
    port: 3330
    user: root
    password: ""
    type: MariaDB
  mq:
    mqType: kafka
    mqHost: kafka-headless.resource.svc.cluster.local.
    mqPort: 9097
    protocol: sasl_plaintext
    tenant: default
    auth:
      username: admin
      password: ""
      mechanism: PLAIN
  opensearch:
    host: opensearch-master.resource.svc.cluster.local.
    port: 9200
    protocol: http
    user: admin
    password: ""
  authorization-private:
    host: authorization-private
    port: 30920
    protocol: http
  user-management:
    host: user-management-private
    port: 30980
    protocol: http
  hydra-admin:
    # ISF replacement: introspect against bkn-safe's paired hydra (cross-ns).
    host: bkn-safe-hydra-admin
    port: 4445
    protocol: http
  mf-model-manager:
    host: mf-model-manager
    port: 9898
    protocol: http
  mf-model-api:
    host: mf-model-api
    port: 9898
    protocol: http
  data-model:
    host: mdl-data-model-svc
    port: 13020
    protocol: http
  uniquery:
    host: mdl-uniquery-svc
    port: 13011
    protocol: http
  business-system:
    host: business-system-service
    port: 80
    protocol: http
  ontology-query:
    host: ontology-query-svc
    port: 13018
    protocol: http
  vega-backend:
    host: vega-backend-svc
    port: 13014
    protocol: http
  agent-operator-integration:
    host: agent-operator-integration
    port: 9000
    protocol: http

config:
  server:
    runMode: release
    httpPort: 13014
    language: zh-CN
    readTimeOut: 600
    writeTimeOut: 600
    maxConcurrentTasks: 4
    viewDataLimit: 1000
    defaultSmallModelName: embedding
    defaultSmallModelEnabled: false
    jobMaxRetryTimes: 3
    reloadJobEnabled: true
  log:
    logLevel: info
    developMode: false
    maxAge: 100
    maxBackups: 20
    maxSize: 100
  # OTel Collector 配置
  otel:
    # 服务名称
    service_name: "bkn-backend"
    # 运行环境
    environment: "production"
    # OTLP 上报端点
    otlp_endpoint: "otelcol-contrib:4318"

    # Trace 配置
    trace:
      enabled: false
      # 采样率: 0.0 - 1.0
      sampling_rate: 1.0

    # Log 配置
    log:
      enabled: false
      # 日志级别: debug, info, warn, error
      level: "info"

# 资源配置
resources:
  requests:
    cpu: 0
    memory: 0Gi
  limits:
    cpu: 2
    memory: 4Gi
