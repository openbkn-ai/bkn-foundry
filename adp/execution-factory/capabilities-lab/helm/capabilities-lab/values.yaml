replicaCount: 1

nodeSelector: {}

namespace: openbkn
moduleName: capabilities-lab

runMode: release

enableSecurityContext: true
securityContext:
  runAsUser: 5000
  runAsGroup: 5000

image:
  registry: ghcr.io/openbkn-ai
  service:
    repository: capabilities-lab
    tag: "__VERSION__"
    pullPolicy: IfNotPresent

service:
  name: capabilities-lab
  type: ClusterIP
  enableDualStack: false
  port: 9002
  defaultBusinessDomain: bd_public
  defaultUserID: capabilities-lab
  metricsEnabled: true
  features:
    catalog: true
    function: true
    impex: true
    mcpSseWizard: true
    skillFiles: true
    hideLegacyExecutionFactoryMenu: false
  ingress:
    enabled: true
    interface:
      path:
        - /api/capabilities-lab/v1
  readinessProbe:
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 10
  livenessProbe:
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 6
  startupProbe:
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 5
    failureThreshold: 30

depServices:
  class-443:
    ingressClass: class-443
  agent-operator-integration:
    privateHost: agent-operator-integration
    privatePort: 9000
    privateProtocol: http

env:
  language: en_US.UTF-8
  timezone: Asia/Shanghai

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 1
    memory: 1Gi
