replicaCount: 1

nodeSelector: {}

namespace: openbkn
moduleName: agent-operator-integration

# bkn-safe authz。authzProvider: "" | "isf" | "shadow" | "bkn-safe"，可回退。
#
# 默认取 bkn-safe：ISF 已退役，空值会让 selectAuthz 落到 ISF 适配器
# （authorization_safe.go:283-286），而授权判定在出错时是 fail-closed
# （decision.go 的 OperationCheckAll 把错误统一转 403），结果是所有鉴权
# 一律拒绝。deploy/conf/config.yaml 等实际部署配置本就传 bkn-safe，此处
# 只是让 chart 默认值与之一致，避免直接 helm install 时踩空。
bknSafe:
  authzProvider: "bkn-safe"
  url: ""

# 设置为dev则为开发模式.
runMode: release

enableSecurityContext: true
securityContext:
  runAsUser: 5000
  runAsGroup: 5000

image:
  registry: ghcr.io/openbkn-ai
  service:
    repository: agent-operator-integration
    tag: "__VERSION__"
    pullPolicy: IfNotPresent

service:
  podID: "POD_ID" # 使用PODID作为machineID, 这里填写podID环境变量名
  name: "agent-operator-integration"
  machineID: ""

  agentOperatorIntegration:
    nodePort: 31023
    ingress:
      enabled: true
      interface:
        path:
          # 只暴露公开面。internal-v1 不校验令牌——身份取自调用方自填的 X-Account-ID 头，
          # 该头缺失时 hydra.go 会把调用者降级为硬编码管理员——一旦挂上 Ingress，其下约
          # 40 条写接口（function/exec、intcomp 注册、impex 导入等）即可从集群外无凭据调用。
          # 集群内调用方（bkn-agent、agent-retrieval）走 ClusterIP agent-operator-integration:9000，
          # 不经 Ingress，不受影响。见 #326。
          - /api/agent-operator-integration/v1
  type: ClusterIP
  enableDualStack: false
  port: 9000
  language: zh-CN
  loggerOutput: stdout
  loggerLevel: 1
  debug: false
  businessTimeOffset: 0
  readinessProbe:
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 10
  livenessProbe:
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 6
  startupProbe:
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 5
    failureThreshold: 30
  operator:
    importFileSizeLimit: 2097152 # 导入文件的大小限制2M
    importOperatorMaxCount: 10 # 批量导入算子的最大数量
    descriptionLengthLimit: 500 # 算子描述的长度限制，单位字符
  mcp:
    connTimeout: 30 # 单位: 秒
    maxInstances: 100 # 最大实例数
    instanceTTL: 1800 # 单位秒
    cleanupInterval: 600 # 单位秒
  category:
    initSwitch: true # 是否初始化算子分类
  proxyModule:
    defaultTimeout: 300 # 单位秒
    maxTimeout: 300 # 单位秒
    maxClients: 50 # 单位秒
    clientLifetime: 600 # 单位秒
  skillIndexBuild:
    enablePeriodicFullScan: false
    periodicFullScanInterval: 168h # 7天
    enableTaskCleanup: false
    taskRetention: 720h # 30天

# 认证开关
auth:
  enabled: true

# 业务域开关
businessDomain:
  enabled: true

depServices:
  class-443:
    ingressClass: class-443
  mq: {}
  rds:
    type: mysql
    host: 127.0.0.1
    port: 3320
    user: ""
    password: ""
    maxConnections: 30
    useExternalDB: false
    connTimeout: 30
    readTimeout: 30
    writeTimeout: 30
    database: openbkn
    dbCharset: utf8mb4
    system_id: ""
  hydra:
    # ISF replacement: introspect/token against bkn-safe's paired hydra (cross-ns).
    publicHost: bkn-safe-hydra-public
    publicPort: 4444
    publicProtocol: http
    administrativeHost: bkn-safe-hydra-admin
    administrativePort: 4445
    administrativeProtocol: http
    administrativePrefix: /admin
  user-management:
    privateHost: user-management-private
    privatePort: 30980
    privateProtocol: http
  authorization:
    privateHost: authorization-private
    privatePort: 30920
    privateProtocol: http
  business-system-service:
    privateHost: business-system-service
    privatePort: 80
    privateProtocol: http
  redis:
    connectType: sentinel
    enableSSL: false
    connectInfo:
      username: root
      password: ""
      host: ""
      port: 26379
      masterHost: ""
      masterPort: 26379
      slaveHost: ""
      slavePort: 26379
      sentinelHost: redis-sentinel.redis.svc.cluster.local
      sentinelPort: 26379
      sentinelUsername: root
      sentinelPassword: ""
      masterGroupName: mymaster
      poolSize: 10
    secretName: ""
    caName: ""
    certName: ""
    keyName: ""
  mf-model-api:
    privateHost: "mf-model-api"
    privatePort: 9898
    privateProtocol: "http"
  mf-model-manager:
    privateHost: mf-model-manager
    privatePort: 9898
    privateProtocol: "http"
  aiGenerationConfig:
    pythonFunctionGeneratorPromptID: ""
    metadataParamGeneratorPromptID: ""
    llm:
      model: ""
      maxTokens: 2048
      temperature: 0.2 # 降低随机性
      topK: 40
      topP: 0.95
      frequencyPenalty: 0.0
      presencePenalty: 0.0
  sandbox-control-plane:
    privateHost: "sandbox-control-plane"
    privatePort: 8000
    privateProtocol: "http"
    templateID: "" # 模板ID,模式使用python-basic
    sessionResources:
      cpu: 1
      memory: 512Mi
      disk: 1Gi
      timeout: 3600 # 单位:秒
    maxSessions: 3
    activeSessions: 1
    maxConcurrentTasks: 100
  oss-gateway-backend:
    privateHost: "oss-gateway-backend"
    privatePort: 8080
    privateProtocol: "http"
    storageID: ""
    internalRequest: false
    expires: 3600
  vega-backend:
    privateHost: vega-backend-svc
    privatePort: 13014
    privateProtocol: http

env:
  language: en_US.UTF-8
  timezone: Asia/Shanghai

resources:
  requests:
    cpu: 200m
    memory: 200Mi
  limits:
    cpu: 4
    memory: 8Gi

observability:
  service_name: agent-operator-integration
  service_version: "1.0.0"
  environment: production
  otlp_endpoint: "otelcol-contrib:4318"
  trace:
    enabled: false
    sampling_rate: 1.0
  log:
    enabled: false
    level: info
