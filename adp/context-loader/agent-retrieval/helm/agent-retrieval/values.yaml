replicaCount: 1

nodeSelector: {}

namespace: openbkn
moduleName: agent-retrieval

# 设置为dev则为开发模式.
runMode: release

enableSecurityContext: true
securityContext:
  runAsUser: 5000
  runAsGroup: 5000

image:
  registry: ghcr.io/openbkn-ai
  service:
    repository: agent-retrieval
    tag: "__VERSION__"
    pullPolicy: IfNotPresent

service:
  podID: "POD_ID" # 使用PODID作为machineID, 这里填写podID环境变量名
  name: "agent-retrieval"
  machineID: ""
  ingressclassname: "class-443"
  agentRetrieval:
    nodePort: 31023
    ingress:
      enabled: true
      interface:
        path:
          - /api/agent-retrieval/v1
  type: ClusterIP
  enableDualStack: false
  port: 30779
  language: zh-CN
  loggerOutput: stdout
  loggerLevel: 1
  debug: false
  businessTimeOffset: 0
  readinessProbe:
    initialDelaySeconds: 0
    periodSeconds: 5
    timeoutSeconds: 5
    failureThreshold: 5
  livenessProbe:
    initialDelaySeconds: 0
    periodSeconds: 5
    timeoutSeconds: 5
    failureThreshold: 5
  startupProbe:
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 5
    failureThreshold: 30
  concept_search_config:
    concept_recall_size: 100
    knn_k: 300
  rerank_llm: # 模型默认走系统默认大模型；per-request 经 rerank_llm_model 覆盖
    temperature: 0
    top_k: 2
    top_p: 0.5
    frequency_penalty: 0.5
    presence_penalty: 0.5
    max_tokens: 5000
  tool_dependency_sync:
    enabled: true
    initial_retry_interval_seconds: 5
    max_retry_interval_seconds: 60
# 认证开关
auth:
  enabled: true

depServices:
  rds:
    type: mysql
    host: 127.0.0.1
    port: 3320
    user: ""
    password: ""
    maxConnections: 30
    useExternalDB: false
    connTimeout: 30
    readTimeout: 30
    writeTimeout: 30
    dbCharset: utf8mb4
    system_id: ""
  hydra:
    publicHost: bkn-safe-hydra-public
    publicPort: 4444
    publicProtocol: http
    administrativeHost: bkn-safe-hydra-admin
    administrativePort: 4445
    administrativeProtocol: http
    administrativePrefix: /admin
  bkn-backend:
    privateHost: bkn-backend-svc
    privatePort: 13014
    privateProtocol: http
  ontology-query:
    privateHost: ontology-query-svc
    privatePort: 13018
    privateProtocol: http
  vega-backend:
    privateHost: vega-backend-svc
    privatePort: 13014
    privateProtocol: http
  agent-operator-integration:
    privateHost: agent-operator-integration
    privatePort: 9000
    privateProtocol: http
  bkn-safe:
    privateHost: bkn-safe
    privatePort: 3000
    privateProtocol: http
  redis:
    connectType: sentinel
    enableSSL: false
    connectInfo:
      username: root
      password: yourpassword
      host: ""
      port: 26379
      masterHost: ""
      masterPort: 26379
      slaveHost: ""
      slavePort: 26379
      sentinelHost: proton-redis-proton-redis-sentinel.resource.svc.cluster.local
      sentinelPort: 26379
      sentinelUsername: root
      sentinelPassword: yourpassword
      masterGroupName: mymaster
      poolSize: 10
    secretName: ""
    caName: ""
    certName: ""
    keyName: ""
  class-443:
    ingressClass: class-443
  mf-model-api:
    privateProtocol: http
    privateHost: mf-model-api
    privatePort: 9898

env:
  language: en_US.UTF-8
  timezone: Asia/Shanghai

resources:
  requests:
    cpu: 200m
    memory: 200Mi
  limits:
    cpu: 4
    memory: 8Gi

observability:
  service_name: agent-retrieval
  service_version: "1.0.0"
  environment: production
  otlp_endpoint: "otelcol-contrib:4318"
  trace:
    enabled: false
    sampling_rate: 1.0
  log:
    enabled: false
    level: info
