  top_k: 2
  top_p: 0.5
  frequency_penalty: 0.5
  presence_penalty: 0.5
  max_tokens: 5000
find_skills:
  default_top_k: 10
  max_top_k: 20
  recall_timeout_ms: 5000
  total_timeout_ms: 10000
  skills_object_type_id: "skills"
tool_dependency_sync:
  enabled: true
  initial_retry_interval_seconds: 5
  max_retry_interval_seconds: 60
