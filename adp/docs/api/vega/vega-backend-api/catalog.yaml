---
openapi: 3.1.1
info:
  title: Catalog
  description: |
    Vega Backend Catalog（数据目录）API。

    Catalog 是一个数据源连接的抽象，对应一个物理数据源（MySQL / OpenSearch / S3 等）
    或逻辑目录（虚拟视图）。资源（`Resource`）按 catalog 归属注册。

    **可检索业务 KV（`extensions`，Issue #382，方案 B）**

    - 与 `tags`（最多 5 个、用于展示的短字符串列表）不同，`extensions` 为 **扁平 string→string**，
      用于 DIP 等域外元数据及 **列表按 key/value 筛选**；持久化见 **`t_entity_extension`**（仅存一套行）。
    - **创建 / 更新**：请求体可选 **`extensions`**。**根对象出现 `extensions` 键**（含 `{}`）
      即对该 catalog 做 KV **整包替换**；**键不出现**则不修改已有 KV。
    - **读取**：详情与列表（`include_extensions=true` 时）返回 **`extensions`**。
    - **列表**：默认不返回各条目的 KV object；`include_extensions=true` 时返回。
      可选 `include_extension_keys` 仅投影部分 key。
    - **列表筛选**：**`extension_key`/`extension_value`**（数组 query，`style=form` + `explode=true`），等长成对 AND。
    - 设计依据：
      [catalog-resource-labels-scheme-b-design.md](../../../design/vega/features/vega-backend/dip-for-extension/catalog-resource-labels-scheme-b-design.md)

    **持久化（与 `migrations/mariadb`、`migrations/dm8` 惯例对齐）**

    - 表名：`t_entity_extension`（**不**改 `t_catalog` / `t_resource` 主表结构）。
    - 列：`f_entity_id` VARCHAR(40) NOT NULL（与 `t_catalog.f_id` **同一取值空间、全局唯一**）、
      `f_key` VARCHAR(128) NOT NULL、`f_value` VARCHAR(512) NOT NULL、
      `f_create_time` / `f_update_time` BIGINT（与现有表时间字段风格一致）。
    - 主键：`PRIMARY KEY (f_entity_id, f_key)`（单值语义；**无** `f_scope` 列，依赖 catalog/resource
      id 全局不冲突之前提，见设计文档）。
    - 索引（MariaDB 示例，DM8 同源语义）：`KEY idx_entity (f_entity_id)`；
      `KEY idx_entity_key_value (f_entity_id, f_key, f_value(191))` 等（前缀长度以方言上限为准）。
    - 删除 catalog 时应用层同事务删除 `t_entity_extension` 中 `f_entity_id` 等于该 catalog `f_id` 的行；
      若级联删除其下 resource，须一并删除对应 resource 的 `f_entity_id` 行。

    本文件仅包含 catalog 自身的 CRUD 与状态相关端点。跨资源的便利端点：
    - `POST /catalogs/{id}/discover`（手动发现一次） → 见 `discover-task.yaml`
    - `GET /catalogs/{ids}/resources`（按 catalog 列资源） → 见 `resource.yaml`
    - `GET /catalogs/{cid}/discover-schedules`（按 catalog 列调度） → 见 `discover-schedule.yaml`

    每个外部接口都有一一对应的内部版本，路径前缀为 `/api/vega-backend/in/v1`，请求体与
    响应结构与外部完全一致；区别仅在于鉴权方式：外部走 OAuth Token 校验，内部从请求头
    （`X-Account-ID` / `X-Account-Type`）解析访问者。

    本文档仅描述外部接口。
  version: 0.2.1
servers:
  - url: /api/vega-backend/v1
paths:
  /api/vega-backend/v1/catalogs:
    get:
      summary: 获取 catalog 列表
      description: |
        分页获取 catalog；支持按 tag、type、health_check_status 过滤。

        **KV 筛选**：`extension_key` / `extension_value` 为数组 query。
        序列化形如 `extension_key=a&extension_key=b&extension_value=1&extension_value=2`。参与筛选的一组参数 **必须等长**，
        按下标配对为 AND 等值条件；长度不一致或未成对 → 400。
      parameters:
        - name: tag
          description: 按标签精确过滤
          in: query
          schema:
            type: string
        - name: type
          description: 按 catalog 类型过滤
          in: query
          schema:
            type: string
            enum:
              - physical
              - logical
        - name: health_check_status
          description: 按健康检查状态过滤
          in: query
          schema:
            type: string
            enum:
              - healthy
              - degraded
              - unhealthy
              - offline
              - unchecked
        - name: enabled
          description: 按 catalog 启用状态过滤
          in: query
          schema:
            type: boolean
        - name: offset
          description: 分页偏移量，>=0，默认 0
          in: query
          schema:
            type: integer
            format: int64
            minimum: 0
            default: 0
        - name: limit
          description: 每页数量，1-1000，-1 表示不分页，默认 20
          in: query
          schema:
            type: integer
            format: int64
            default: 20
        - name: sort
          description: 排序字段
          in: query
          schema:
            type: string
            enum:
              - name
              - create_time
              - update_time
            default: update_time
        - name: direction
          description: 排序方向
          in: query
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
        - name: extension_key
          description: 与 `extension_value` 成对；多条件 AND。等长数组，按下标配对；等值匹配 `t_entity_extension.f_key`。
          in: query
          schema:
            type: array
            maxItems: 5
            items:
              type: string
              maxLength: 128
          style: form
          explode: true
        - name: extension_value
          description: 与 `extension_key` 成对；语义见 `extension_key`。
          in: query
          schema:
            type: array
            maxItems: 5
            items:
              type: string
              maxLength: 512
          style: form
          explode: true
        - name: include_extensions
          description: |
            为 true 时列表 `entries` 中每条 Catalog 带 `extensions`；默认 false。
          in: query
          schema:
            type: boolean
            default: false
        - name: include_extension_keys
          description: |
            逗号分隔的 key 列表；在 `include_extensions` 为 true 时仅返回列出的 key（仍一次加载后过滤）。
            未携带或为空表示返回全部 key。
          in: query
          schema:
            type: string
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListCatalogs"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"
    post:
      summary: 创建 catalog
      description: |
        创建一个新的 catalog。`name` 全局唯一，已存在时返回 409。
        `connector_type` 必须是已注册且 enabled 的连接器类型。

        可选 **`extensions`**：与 `t_catalog` 插入 **同一事务**内写入 `t_entity_extension`。
        响应体 `CatalogRef` 返回 `extensions`，与持久化一致。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CatalogRequest"
      responses:
        "201":
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogRef"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "406":
          $ref: "#/components/responses/NotAcceptable"
        "409":
          description: 同名 catalog 已存在 / connector_type 未启用
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/vega-backend/v1/catalogs/{ids}:
    parameters:
      - name: ids
        description: catalog ID，多个用英文逗号分隔（如 `id1,id2,id3`）
        in: path
        required: true
        schema:
          type: string
    get:
      summary: 获取 catalog 详情
      description: |
        路径参数支持单条或批量（逗号分隔）；批量时不存在的 ID 不会报错，结果中按存在的返回。
        每条 `Catalog` 含 **`extensions`**（无副表行时为 `{}`）。
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  entries:
                    type: array
                    items:
                      $ref: "#/components/schemas/Catalog"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"
    delete:
      summary: 删除 catalog
      description: |
        路径参数支持单条或批量（逗号分隔）。删除会同步移除该 catalog 下的资源、调度等关联记录，
        并删除 `t_entity_extension` 中 `f_entity_id` 等于被删 catalog / resource `f_id` 的行（应用层同事务）。
      responses:
        "204":
          description: 删除成功
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/vega-backend/v1/catalogs/{id}:
    parameters:
      - name: id
        description: catalog ID
        in: path
        required: true
        schema:
          type: string
    put:
      summary: 修改 catalog
      description: |
        全量更新指定 catalog。catalog 由路径参数 `id` 唯一确定（主键不可改）。

        请求体的 `id` 字段**必填**，且必须与路径参数完全一致：
        - 缺失 / 格式非法 → 400 `VegaBackend.InvalidParameter.ID`。
        - 不一致 → 409 `VegaBackend.Catalog.IDMismatch`。

        `name` 改动后若新名称已被其它 catalog 占用，返回 409 `VegaBackend.Catalog.NameExists`。

        `enabled` 不能通过 PUT 切换；请求体中的 `enabled` 必须与当前 catalog 状态一致。
        如需启用/禁用，使用 `POST /catalogs/{id}/enable` 或 `POST /catalogs/{id}/disable`。

        **extensions**：请求体若包含 **`extensions` 键**（含空对象 `{}`），则对该 catalog **整包替换**
        `t_entity_extension` 中 `f_entity_id = id` 的全部行；**键未出现**则不修改副表。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CatalogRequest"
      responses:
        "204":
          description: 更新成功
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "406":
          $ref: "#/components/responses/NotAcceptable"
        "409":
          description: |
            主键 / 名称冲突。可能的错误码：
            - `VegaBackend.Catalog.IDMismatch`
            - `VegaBackend.Catalog.NameExists`
            - `VegaBackend.Catalog.InvalidParameter`（尝试通过 PUT 切换 enabled）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/vega-backend/v1/catalogs/{id}/enable:
    parameters:
      - name: id
        description: catalog ID
        in: path
        required: true
        schema:
          type: string
    post:
      summary: 启用 catalog
      description: |
        启用 catalog。接口幂等：已启用的 catalog 再次启用返回 204。
        从禁用切换为启用时，`health_check_status` 重置为 `unchecked`。
      responses:
        "204":
          description: 启用成功或已启用
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/vega-backend/v1/catalogs/{id}/disable:
    parameters:
      - name: id
        description: catalog ID
        in: path
        required: true
        schema:
          type: string
    post:
      summary: 禁用 catalog
      description: |
        禁用 catalog。接口幂等：已禁用的 catalog 再次禁用返回 204。
        禁用不会覆盖 `health_check_status`，健康状态保留最近一次检查结果。
      responses:
        "204":
          description: 禁用成功或已禁用
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/vega-backend/v1/catalogs/{id}/health-status:
    parameters:
      - name: id
        description: catalog ID
        in: path
        required: true
        schema:
          type: string
    get:
      summary: 获取 catalog 健康状态
      description: 返回指定 catalog 的最近一次健康检查结果（状态 + 时间 + 详情）。
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogHealthStatusEntry"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/vega-backend/v1/catalogs/{id}/test-connection:
    parameters:
      - name: id
        description: catalog ID
        in: path
        required: true
        schema:
          type: string
    post:
      summary: 测试 catalog 连接
      description: |
        以当前持久化的 `connector_config` 真实建立一次到数据源的连接，验证连通性。
        与 `health-status`（异步定时检查的最近结果）不同，本端点是**同步实时探测**。

        探测结果通过响应体 `success` 字段返回；连不通**不**视为 HTTP 错误：
        - 连通 → 200 `{ success: true, message }`
        - 连不通 → 200 `{ success: false, message }`
        - 非 2xx 仅用于"请求 / 鉴权 / 服务内部"问题，与目标连通性无关。
      responses:
        "200":
          description: 探测完成（成功或失败均返回，业务结果看 `success` 字段）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestConnectionResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
components:
  responses:
    BadRequest:
      description: |
        请求参数 / 请求体非法。常见 errcode（命名以合入代码为准）：
        - `VegaBackend.InvalidParameter.RequestBody`：body schema 不合法
        - `VegaBackend.InvalidParameter.ID`：`id` 缺失或格式非法（小写字母/数字/`_`/`-`，首字符须为字母或数字，长度 ≤40）
        - `VegaBackend.Extensions.InvalidFormat`：`extensions` 非 object 或 key/value 非 string
        - `VegaBackend.Extensions.QuotaExceeded`：条数或长度超限
        - `VegaBackend.Extensions.ReservedKey`：key 以 `vega_` 开头
        - `VegaBackend.Extensions.MismatchedQueryPairs`：`extension_key` / `extension_value` 数组长度不一致或未成对
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unauthorized:
      description: 未授权（OAuth Token 校验失败）
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: 资源不存在
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotAcceptable:
      description: Content-Type 不是 application/json
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    InternalServerError:
      description: 服务内部错误
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
  schemas:
    Error:
      description: |
        统一错误响应体。由 `kweaver-go-lib/rest.BaseError` JSON 序列化得到。
      type: object
      required:
        - error_code
        - description
        - solution
        - error_link
        - error_details
      properties:
        error_code:
          type: string
        description:
          type: string
        solution:
          type: string
        error_link:
          type: string
        error_details:
          description: 详细内容，类型不固定
    EntityExtensions:
      description: |
        扁平 KV 的 JSON object 形态（`string`→`string`）。用于 **`Catalog` / `CatalogRequest` / `CatalogRef`**
        上的 **`extensions`** 属性。

        存于 `t_entity_extension`；与 `tags` 语义独立。无数据时 JSON 为 `{}`。单实体条数、键值长度以服务端配置为准
        （建议 ≤64 条；key ≤128；value ≤512 UTF-8）；禁止 key 以 `vega_` 开头（平台保留）。

        **列表**：`include_extensions` 为 true 时，条目返回 `extensions`；默认 false 时可省略以减小负载。
        `include_extension_keys` 非空时仅投影所列 key。

        **请求体（POST/PUT）**：根对象出现 **`extensions` 键**（含 `{}`）即触发该实体 KV **整包替换**；
        **键未出现**则不修改副表（与 `info.description` 一致）。
      type: object
      maxProperties: 64
      additionalProperties:
        type: string
        maxLength: 512
      propertyNames:
        maxLength: 128
    AccountInfo:
      description: 账号信息
      type: object
      properties:
        id:
          type: string
        type:
          description: 账号类型（user / app / anonymous 等）
          type: string
    Catalog:
      description: Catalog（数据目录）实体
      type: object
      required:
        - id
        - name
        - type
        - enabled
        - connector_type
      properties:
        id:
          description: catalog ID；小写字母、数字、下划线、连字符，不能以下划线开头，最大长度 40
          type: string
          pattern: "^[a-z0-9][a-z0-9\\-_]{0,39}$"
          maxLength: 40
        name:
          description: catalog 名称，必填，全局唯一，最大长度 255
          type: string
          minLength: 1
          maxLength: 255
        tags:
          description: 标签列表（可选），最多 5 个，每个标签非空且最大长度 40，不能包含特殊字符
          type: array
          maxItems: 5
          items:
            type: string
            minLength: 1
            maxLength: 40
        description:
          description: 描述，最大长度 1000
          type: string
          maxLength: 1000
        type:
          description: catalog 类型
          type: string
          enum:
            - physical
            - logical
        enabled:
          description: 是否启用
          type: boolean
        connector_type:
          description: 连接器类型标识（参见 connector-type.yaml）
          type: string
        connector_config:
          description: 连接器配置（结构由 ConnectorType.field_config 决定）
          type: object
          additionalProperties: true
        metadata:
          description: 扩展元信息
          type: object
          additionalProperties: true
        extensions:
          $ref: "#/components/schemas/EntityExtensions"
        health_check_enabled:
          description: 是否开启周期健康检查
          type: boolean
        health_check_status:
          description: 最近一次健康检查状态
          type: string
          enum:
            - healthy
            - degraded
            - unhealthy
            - offline
            - unchecked
        last_check_time:
          description: 最近一次健康检查时间（毫秒时间戳）
          type: integer
          format: int64
        health_check_result:
          description: 最近一次健康检查详情
          type: string
        creator:
          $ref: "#/components/schemas/AccountInfo"
        create_time:
          type: integer
          format: int64
        updater:
          $ref: "#/components/schemas/AccountInfo"
        update_time:
          type: integer
          format: int64
        operations:
          description: 当前用户对该 catalog 的操作权限集合
          type: array
          items:
            type: string
    CatalogRequest:
      description: |
        catalog 创建 / 更新请求体。

        - POST：`id` 可省略，由后端生成；若携带且已存在，返回 409 `VegaBackend.Catalog.IdExists`。
        - PUT：`id` **必填**，且必须与路径参数 `id` 完全一致。缺失或格式非法返回 400 `VegaBackend.InvalidParameter.ID`，不一致返回 409 `VegaBackend.Catalog.IDMismatch`。
        - `enabled` 使用 boolean 零值语义：未传按 `false` 处理。PUT 时该值必须与当前 catalog 状态一致；启停切换请使用专用 enable/disable 接口。

        可选 **`extensions`**（见 `EntityExtensions`）：写入规则见 `info.description`。
      type: object
      required:
        - name
        - enabled
        - connector_type
      properties:
        id:
          description: catalog ID；POST 时可省略由后端生成，PUT 时必填且必须与路径参数一致；小写字母、数字、下划线、连字符，不能以下划线开头，最大长度 40
          type: string
          pattern: "^[a-z0-9][a-z0-9\\-_]{0,39}$"
          maxLength: 40
        name:
          description: catalog 名称，必填，全局唯一，最大长度 255
          type: string
          minLength: 1
          maxLength: 255
        tags:
          description: 标签列表（可选），最多 5 个，每个标签非空且最大长度 40，不能包含特殊字符
          type: array
          maxItems: 5
          items:
            type: string
            minLength: 1
            maxLength: 40
        description:
          description: 描述，最大长度 1000
          type: string
          maxLength: 1000
        enabled:
          description: 是否启用；未传按 false 处理。PUT 不允许切换该字段，启停切换请使用专用 enable/disable 接口。
          type: boolean
        connector_type:
          description: 连接器类型标识；必须是已注册且 enabled 的类型
          type: string
        connector_config:
          description: 连接器配置；字段由 ConnectorType.field_config 决定
          type: object
          additionalProperties: true
        extensions:
          $ref: "#/components/schemas/EntityExtensions"
    ListCatalogs:
      description: catalog 列表
      type: object
      required:
        - entries
        - total_count
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/Catalog"
        total_count:
          type: integer
          format: int64
    CatalogRef:
      description: catalog 引用（创建成功响应）；含 `extensions`
      type: object
      required:
        - id
      properties:
        id:
          type: string
        extensions:
          $ref: "#/components/schemas/EntityExtensions"
    CatalogHealthStatusEntry:
      description: catalog 健康状态条目
      type: object
      required:
        - id
        - health_check_status
      properties:
        id:
          description: catalog ID
          type: string
        health_check_status:
          type: string
          enum:
            - healthy
            - degraded
            - unhealthy
            - offline
            - unchecked
        last_check_time:
          description: 最近一次检查时间（毫秒时间戳）
          type: integer
          format: int64
        health_check_result:
          description: 检查详情 / 错误信息
          type: string
    TestConnectionResult:
      description: 连接测试结果
      type: object
      required:
        - success
      properties:
        success:
          description: 是否连通
          type: boolean
        message:
          description: 详情（失败时为错误信息）
          type: string
