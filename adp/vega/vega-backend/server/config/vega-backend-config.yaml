server:
  runMode: release
  httpPort: 13014
  language: zh-CN
  readTimeOut: 600
  writeTimeOut: 600
log:
  logLevel: debug
  developMode: false
  maxAge: 100
  maxBackups: 20
  maxSize: 100
# OTel Collector 配置
otel:
  # 服务名称
  service_name: "vega-backend"
  # 运行环境
  environment: "production"
  # OTLP 上报端点
  otlp_endpoint: "otelcol-contrib:4318"

  # Trace 配置
  trace:
    enabled: false
    # 采样率: 0.0 - 1.0
    sampling_rate: 1.0

  # Log 配置
  log:
    enabled: false
    # 日志级别: debug, info, warn, error
    level: "info"
crypto:
  enabled: false
  privateKeyPath: /opt/vega-backend/secret-config/rsa_private_key_pkcs8.pem
  publicKeyPath: /opt/vega-backend/secret-config/rsa_public_key.pem

depServices:
  class-443:
    ingressClass: class-443
  rds:
    host: 192.168.40.63
    port: 30006
    user: root
    password: "eisoo.com123"
    type: MariaDB
  mq:
    mqType: kafka
    mqHost: kafka-headless.resource.svc.cluster.local.
    mqPort: 9097
    protocol: sasl_plaintext
    tenant: default
    auth:
      username: admin
      password: ""
      mechanism: PLAIN
  opensearch:
    host: opensearch-master.resource.svc.cluster.local.
    port: 9200
    protocol: http
    user: admin
    password: ""
  redis:
    connectInfo:
      username: root
      password: ''
      sentinelHost: proton-redis-proton-redis-sentinel.resource.svc.cluster.local
      sentinelPort: 26379
      sentinelUsername: root
      sentinelPassword: ''
      masterGroupName: mymaster
      host: ""
      port: 0
      masterHost: ""
      masterPort: 0
      slaveHost: ""
      slavePort: 0
    connectType: sentinel
  authorization-private:
    host: authorization-private
    port: 30920
    protocol: http
  user-management:
    host: user-management-private
    port:  30980
    protocol: http
  hydra-admin:
    host: hydra-admin
    port: 4445
    protocol: http
  kafka-connect:
    host: kafka-connect-svc
    port: 8083
    protocol: http
  mf-model-manager:
    host: mf-model-manager
    port: 9898
    protocol: http
  mf-model-api:
    host: mf-model-api
    port: 9898
    protocol: http
  bkn-agent:
    host: bkn-agent
    port: 9898
    protocol: http

rateLimiting:
  concurrency:
    enabled: false
    global:
      max_concurrent_queries: 10

query:
  # 进程内 cursor session 的全局上限；达到上限时拒绝新的 cursor 请求。
  cursorMaxSessions: 1000
