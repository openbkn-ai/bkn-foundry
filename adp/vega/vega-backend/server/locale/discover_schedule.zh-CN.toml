[VegaBackend.DiscoverSchedule.NotFound]
Description = "采集调度不存在"
Solution = "请检查调度 ID 是否存在"
ErrorLink = "暂无"

[VegaBackend.DiscoverSchedule.InvalidCronExpr]
Description = "cron 表达式非法"
Solution = "请提供合法的 5/6 字段 cron 表达式"
ErrorLink = "暂无"

[VegaBackend.DiscoverSchedule.InvalidStrategies]
Description = "采集策略非法"
Solution = "strategies 必须是 [insert, delete, update] 的子集；空数组表示全部"
ErrorLink = "暂无"

[VegaBackend.DiscoverSchedule.InvalidTimeRange]
Description = "采集调度时间范围非法"
Solution = "start_time 和 end_time 必须大于等于 0；end_time 为 0 表示无结束时间，否则 start_time 必须小于等于 end_time"
ErrorLink = "暂无"

[VegaBackend.DiscoverSchedule.IdMismatch]
Description = "请求体中的 id 与 path 中的 id 不一致"
Solution = "请保持两者一致或省略 body.id"
ErrorLink = "暂无"

[VegaBackend.DiscoverSchedule.CatalogMismatch]
Description = "不能修改已有调度的 catalog_id"
Solution = "catalog_id 为只读字段；如需在其它 catalog 下调度，请新建一条"
ErrorLink = "暂无"

[VegaBackend.DiscoverSchedule.EnabledFieldNotAllowed]
Description = "PUT 请求不允许修改 enabled 字段"
Solution = "请使用 POST /discover-schedules/{id}/enable 或 /disable 切换状态"
ErrorLink = "暂无"

