[VegaBackend.DiscoverSchedule.NotFound]
Description = "Discover schedule not found"
Solution = "Please check if the schedule ID exists"
ErrorLink = "No solution"

[VegaBackend.DiscoverSchedule.InvalidCronExpr]
Description = "Invalid cron expression"
Solution = "Please provide a valid 5/6-field cron expression"
ErrorLink = "No solution"

[VegaBackend.DiscoverSchedule.InvalidStrategies]
Description = "Invalid discover strategy"
Solution = "Strategy must be one of [full_sync, create_only, cleanup_only]; empty means full_sync"
ErrorLink = "No solution"

[VegaBackend.DiscoverSchedule.InvalidTimeRange]
Description = "Invalid discover schedule time range"
Solution = "start_time and end_time must be greater than or equal to 0; end_time may be 0 for no end time, otherwise start_time must be less than or equal to end_time"
ErrorLink = "No solution"

[VegaBackend.DiscoverSchedule.IdMismatch]
Description = "Body id does not match path id"
Solution = "Either omit body.id or set it equal to the path id"
ErrorLink = "No solution"

[VegaBackend.DiscoverSchedule.CatalogMismatch]
Description = "Cannot change catalog_id of an existing schedule"
Solution = "catalog_id is read-only; create a new schedule under the target catalog instead"
ErrorLink = "No solution"

[VegaBackend.DiscoverSchedule.EnabledFieldNotAllowed]
Description = "PUT request must not change the 'enabled' field"
Solution = "Use POST /discover-schedules/{id}/enable or /disable to change enabled state"
ErrorLink = "No solution"

