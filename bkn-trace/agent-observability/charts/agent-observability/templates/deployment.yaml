apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agent-observability.fullname" . }}
  labels:
    {{- include "agent-observability.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "agent-observability.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "agent-observability.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "agent-observability.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: agent-observability
          image: {{ printf "%s/%s:%s" .Values.image.registry .Values.image.repository .Values.image.tag | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: OPENSEARCH_ENDPOINT
              value: {{ .Values.opensearch.endpoint | quote }}
            - name: OPENSEARCH_TRACE_INDEX
              value: {{ .Values.opensearch.traceIndex | quote }}
            - name: OPENSEARCH_AUTH_ENABLED
              value: {{ ternary "true" "false" .Values.opensearch.auth.enabled | quote }}
            {{- if .Values.opensearch.auth.enabled }}
            - name: OPENSEARCH_AUTH_USERNAME
              value: {{ .Values.opensearch.auth.username | quote }}
            - name: OPENSEARCH_AUTH_PASSWORD
              value: {{ .Values.opensearch.auth.password | quote }}
            {{- end }}
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
