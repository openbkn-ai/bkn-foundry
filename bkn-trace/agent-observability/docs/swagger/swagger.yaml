basePath: /api/agent-observability/v1
definitions:
  rdto.ErrorResponse:
    properties:
      code:
        type: string
      details: {}
      message:
        type: string
    type: object
info:
  contact: {}
  description: APIs for querying agent traces from OpenSearch.
  title: Agent Observability API
  version: "1.0"
paths:
  /api/agent-observability/v1/evidence-nodes/{node_id}:
    get:
      description: Returns one visible claim, evidence ref, or business ref node scoped
        by trace_id or request_id.
      parameters:
      - description: Evidence node ID, for example claim:claim_001
        in: path
        name: node_id
        required: true
        type: string
      - description: Trace ID scope
        in: query
        name: trace_id
        type: string
      - description: BKN request ID scope
        in: query
        name: request_id
        type: string
      - description: Maximum evidence trace batches to read, 1..1000
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/rdto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/rdto.ErrorResponse'
        "405":
          description: Method Not Allowed
          schema:
            $ref: '#/definitions/rdto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/rdto.ErrorResponse'
      summary: Get evidence node details
      tags:
      - evidence
  /api/agent-observability/v1/evidence/events:
    post:
      consumes:
      - application/json
      description: Accepts claim.created, evidence.refs.created, and business.refs.resolved
        events and stores the normalized evidence model.
      parameters:
      - description: BKN Trace phase-two evidence event batch
        in: body
        name: request
        required: true
        schema:
          type: string
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/rdto.ErrorResponse'
        "405":
          description: Method Not Allowed
          schema:
            $ref: '#/definitions/rdto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/rdto.ErrorResponse'
      summary: Ingest BKN Trace phase-two evidence events
      tags:
      - evidence
  /api/agent-observability/v1/traces/_search:
    post:
      consumes:
      - application/json
      description: Proxy raw OpenSearch DSL to the configured trace index and return
        the original OpenSearch response body.
      parameters:
      - description: OpenSearch DSL JSON body
        in: body
        name: request
        required: true
        schema:
          type: string
      produces:
      - application/json
      responses:
        "200":
          description: Raw OpenSearch search response
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/rdto.ErrorResponse'
        "405":
          description: Method Not Allowed
          schema:
            $ref: '#/definitions/rdto.ErrorResponse'
        "504":
          description: Gateway Timeout
          schema:
            $ref: '#/definitions/rdto.ErrorResponse'
      summary: Search traces with raw OpenSearch DSL
      tags:
      - traces
  /api/agent-observability/v1/traces/{trace_id}/business-graph:
    get:
      description: Returns claim and business semantic nodes/edges derived from business.refs.resolved
        events.
      parameters:
      - description: Trace ID
        in: path
        name: trace_id
        required: true
        type: string
      - description: Maximum evidence trace batches to read, 1..1000
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/rdto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/rdto.ErrorResponse'
        "405":
          description: Method Not Allowed
          schema:
            $ref: '#/definitions/rdto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/rdto.ErrorResponse'
      summary: Get business semantic graph by trace ID
      tags:
      - evidence
  /api/agent-observability/v1/traces/{trace_id}/evidence-chain:
    get:
      description: Returns normalized claim, evidence refs, business refs, pagination,
