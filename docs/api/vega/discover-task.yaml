---
openapi: 3.1.1
info:
  title: DiscoverTask
  description: |
    Vega Backend 资源发现任务（DiscoverTask）相关 API。

    DiscoverTask 是**执行审计记录**，由两条路径产生：

    - 手动触发：`POST /catalogs/{id}/discover`（动作端点，本规范末尾覆盖）
    - 定时触发：worker 内部由 `DiscoverSchedule`（见 [discover-schedule.yaml](discover-schedule.yaml)）按 cron 触发

    状态机（`pending → running → completed/failed`）由 worker 单向推进；
    用户不能 cancel / retry / restart。对外仅暴露 list / get / delete 三类只读 + 清理操作。

    端点设计遵循 [vega-backend/CLAUDE.md] 的"端点设计规则"：批量删除走 path
    （`DELETE /discover-tasks/{ids}`，逗号分隔），按父资源过滤一律走 query
    （如 `GET /discover-tasks?catalog_id=` / `?schedule_id=`），不提供嵌套列表视图。
  version: 0.1.0
servers:
  - url: /api/vega-backend/v1
security:
  - OAuth2: []
paths:
  /discover-tasks:
    get:
      summary: 获取发现任务列表
      description: 分页获取发现任务；支持按 catalog_id / schedule_id / status / trigger_type 过滤。
      parameters:
        - name: catalog_id
          description: 按归属 catalog 过滤
          in: query
          schema:
            type: string
        - name: schedule_id
          description: |
            按归属 DiscoverSchedule 过滤；trigger_type=manual 的 task 该字段恒为空字符串。
          in: query
          schema:
            type: string
        - name: status
          description: 按状态过滤
          in: query
          schema:
            type: string
            enum:
              - pending
              - running
              - completed
              - failed
        - name: trigger_type
          description: 按触发方式过滤
          in: query
          schema:
            type: string
            enum:
              - manual
              - scheduled
        - name: offset
          description: 分页偏移量，>=0，默认 0
          in: query
          schema:
            type: integer
            format: int64
            minimum: 0
            default: 0
        - name: limit
          description: 每页数量，默认 20
          in: query
          schema:
            type: integer
            format: int64
            default: 20
        - name: sort
          description: 排序字段（当前数据访问层固定按 create_time 倒序，sort 参数预留）
          in: query
          schema:
            type: string
        - name: direction
          description: 排序方向
          in: query
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListDiscoverTasks"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /discover-tasks/{id}:
    parameters:
      - name: id
        description: DiscoverTask ID；DELETE 时可传逗号分隔的 ID 列表
        in: path
        required: true
        schema:
          type: string
    get:
      summary: 获取发现任务详情
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiscoverTask"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
    delete:
      summary: 删除发现任务（整体事务）
      description: |
        整体事务语义：所有 id 通过预校验后才进入删除阶段，任一预校验失败整批不删。

        预校验顺序：

        1. 任一 id 处于 `pending` / `running` → 409 `VegaBackend.DiscoverTask.HasRunningExecution`，
           `error_details` 携带 `{ running_ids: [...] }`。状态拦截**不可绕过**——避免删除
           掉 worker 正在写入的 task 留下孤儿数据。需等待任务进入终态（completed/failed）。
        2. 任一 id 不存在（且未启用 `ignore_missing`）→ 404 `VegaBackend.DiscoverTask.NotFound`，
           `error_details` 携带 `{ missing_ids: [...] }`。
        3. 全部通过 → 逐条删除，返回 204。
      parameters:
        - name: ignore_missing
          description: |
            放宽不存在性检查：缺失 id 视为已删除（静默跳过），其它 id 正常删。
            **不影响** pending/running 拦截。
          in: query
          schema:
            type: boolean
            default: false
      responses:
        "204":
          description: 删除成功
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /catalogs/{id}/discover:
    parameters:
      - name: id
        description: Catalog ID
        in: path
        required: true
        schema:
          type: string
    post:
      summary: 手动触发 catalog 资源发现
      description: |
        对指定 catalog 触发一次资源发现。**异步语义**：服务端创建一条 `trigger_type=manual`
        的 DiscoverTask 并立即返回 task id；实际发现执行由 worker 异步推进。客户端可用
        返回的 task id 通过 `GET /discover-tasks/{id}` 轮询执行进度。

        可选请求体 `{"strategy":"full_sync|create_only|cleanup_only"}`；省略时默认
        `full_sync`。本端点保留 RPC 风格嵌套形态——是对 catalog 的动作而非创建顶层 task。

        仅支持 `type=physical` 的 catalog；`type=logical` 会返回 400。
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DiscoverTriggerRequest"
      responses:
        "200":
          description: 触发成功，DiscoverTask 已创建并入队
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiscoverTriggerResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Catalog 不存在
          content:
            application/json:
              schema:
                $ref: "../_shared/errors.yaml#/components/schemas/Error"
        "409":
          description: Catalog 已禁用
          content:
            application/json:
              schema:
                $ref: "../_shared/errors.yaml#/components/schemas/Error"
        "500":
          $ref: "#/components/responses/InternalServerError"
components:
  securitySchemes:
    OAuth2:
      $ref: "../_shared/auth.yaml#/components/securitySchemes/OAuth2"
  responses:
    BadRequest:
      description: 请求参数 / 请求体非法
      content:
        application/json:
          schema:
            $ref: "../_shared/errors.yaml#/components/schemas/Error"
    Unauthorized:
      description: 未授权（OAuth Token 校验失败）
      content:
        application/json:
          schema:
            $ref: "../_shared/errors.yaml#/components/schemas/Error"
    NotFound:
      description: 资源不存在
      content:
        application/json:
          schema:
            $ref: "../_shared/errors.yaml#/components/schemas/Error"
    Conflict:
      description: |
        状态冲突：task 处于 pending/running 无法删除
      content:
        application/json:
          schema:
            $ref: "../_shared/errors.yaml#/components/schemas/Error"
    InternalServerError:
      description: 服务内部错误
      content:
        application/json:
          schema:
            $ref: "../_shared/errors.yaml#/components/schemas/Error"
  schemas:
    AccountInfo:
      description: 操作者信息
      type: object
      required:
        - id
        - type
      properties:
        id:
          description: 账户 ID
          type: string
        type:
          description: 账户类型
          type: string
        name:
          description: 显示名
          type: string
    DiscoverResult:
      description: 发现任务执行结果（仅在 status=completed 时有意义）
      type: object
      required:
        - catalog_id
        - new_count
        - stale_count
        - unchanged_count
        - message
      properties:
        catalog_id:
          description: 关联 catalog ID
          type: string
        new_count:
          description: 本次发现的新增资源数
          type: integer
        stale_count:
          description: 本次发现已失效的资源数
          type: integer
        unchanged_count:
          description: 本次发现未变化的资源数
          type: integer
        message:
          description: 执行说明
          type: string
    DiscoverTask:
      description: 发现任务实体
      type: object
      required:
        - id
        - catalog_id
        - schedule_id
        - strategy
        - trigger_type
        - status
        - progress
        - message
        - creator
        - create_time
      properties:
        id:
          description: 全局唯一 ID
          type: string
        catalog_id:
          description: 关联 catalog ID
          type: string
        schedule_id:
          description: |
            关联的 DiscoverSchedule ID。trigger_type=manual 时为空字符串。
          type: string
        strategy:
          description: 发现策略
          type: string
          enum:
            - full_sync
            - create_only
            - cleanup_only
        trigger_type:
          description: 触发方式
          type: string
          enum:
            - manual
            - scheduled
        status:
          description: 状态
          type: string
          enum:
            - pending
            - running
            - completed
            - failed
        progress:
          description: 进度，0-100
          type: integer
        message:
          description: 状态说明 / 错误信息
          type: string
        start_time:
          description: 开始执行时间，毫秒级时间戳；未开始时为 0
          type: integer
          format: int64
        finish_time:
          description: 完成时间，毫秒级时间戳；未完成时为 0
          type: integer
          format: int64
        result:
          description: 执行结果（仅 completed 状态下非空）
          $ref: "#/components/schemas/DiscoverResult"
        creator:
          $ref: "#/components/schemas/AccountInfo"
        create_time:
          description: 创建时间，毫秒级时间戳
          type: integer
          format: int64
    DiscoverTriggerResponse:
      description: 手动触发响应（异步——返回新建的 DiscoverTask ID）
      type: object
      required:
        - id
      properties:
        id:
          description: 新建 DiscoverTask 的 ID；可用 `GET /discover-tasks/{id}` 轮询进度
          type: string
    DiscoverTriggerRequest:
      description: 手动触发发现时的可选策略；省略时服务端使用 `full_sync`
      type: object
      properties:
        strategy:
          type: string
          enum:
            - full_sync
            - create_only
            - cleanup_only
    ListDiscoverTasks:
      description: 发现任务列表
      type: object
      required:
        - entries
        - total_count
      properties:
        entries:
          description: 条目列表
          type: array
          items:
            $ref: "#/components/schemas/DiscoverTask"
        total_count:
          description: 总条数
          type: integer
          format: int64
