---
openapi: 3.1.1
info:
  title: BuildTask
  description: |
    Vega Backend 构建任务（BuildTask）相关 API。

    BuildTask 是顶级独立资源，每条 task 关联 1 个 Resource，对其执行 streaming /
    batch 两种模式之一的构建。状态机：

      init → running → stopping → stopped
                    ↘ completed
                    ↘ failed

    外部仅可触发 `start` / `stop` 两个动作；其它状态由 worker 内部转移，外部只读。
    `start` / `stop` 返回 HTTP 202 且 body 为空，仅表示"指令被接受"，**不**表示
    status 已切换；持久化 status 由 worker 实际执行时写入，客户端如需感知应轮询 GET。

    端点设计遵循 [vega-backend/CLAUDE.md] 的"端点设计规则"：批量删除走 path
    （`DELETE /build-tasks/{ids}`，逗号分隔），不提供 `/resources/{id}/build-tasks`
    嵌套列表视图——按父资源过滤一律走 `GET /build-tasks?resource_id={id}`。
  version: 0.1.0
servers:
  - url: /api/vega-backend/v1
security:
  - OAuth2: []
paths:
  /build-tasks:
    get:
      summary: 获取构建任务列表
      description: 分页获取构建任务；支持按 resource_id / catalog_id / status / mode 过滤。
      parameters:
        - name: resource_id
          description: 按归属 resource 过滤
          in: query
          schema:
            type: string
        - name: catalog_id
          description: 按归属 catalog 过滤
          in: query
          schema:
            type: string
        - name: status
          description: 按状态过滤
          in: query
          schema:
            type: string
            enum:
              - init
              - running
              - stopping
              - stopped
              - completed
              - failed
        - name: mode
          description: 按任务模式过滤
          in: query
          schema:
            type: string
            enum:
              - streaming
              - batch
        - name: offset
          description: 分页偏移量，>=0，默认 0
          in: query
          schema:
            type: integer
            format: int64
            minimum: 0
            default: 0
        - name: limit
          description: 每页数量，默认 20
          in: query
          schema:
            type: integer
            format: int64
            default: 20
        - name: order_by
          description: 排序字段；默认 `default`（构建中的任务优先）
          in: query
          schema:
            type: string
            enum:
              - default
              - created_at
              - updated_at
              - status
              - mode
            default: default
        - name: order
          description: 排序方向，默认 desc；`order_by=default` 时固定使用服务端复合排序
          in: query
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
        - name: active
          description: "`true` 时筛选 `running` 与 `init`，优先于 `status`"
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListBuildTasks"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"
    post:
      summary: 创建构建任务
      description: |
        为指定 Resource 创建构建任务。同一 Resource 同时只能有一个 BuildTask；
        已存在时返回 400 `VegaBackend.BuildTask.Exist`。

        - `streaming` 模式要求 Resource 在 `source_metadata.primary_keys` 中声明主键。
        - `batch` 模式要求 `build_key_fields` 非空。
        - 所有字段都需要在 Resource 的 schema 中存在；否则 400。
        - 创建后 status = `init`。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBuildTaskRequest"
      responses:
        "201":
          description: 创建成功
          content:
            application/json:
              schema:
                type: object
                required:
                  - id
                  - resource_id
                  - status
                properties:
                  id:
                    description: 新建 BuildTask ID
                    type: string
                  resource_id:
                    description: 关联 resource ID
                    type: string
                  status:
                    description: 初始 status，恒为 `init`
                    type: string
                    enum:
                      - init
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "406":
          $ref: "#/components/responses/NotAcceptable"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /build-tasks/{id}:
    parameters:
      - name: id
        description: BuildTask ID；DELETE 时可传逗号分隔的 ID 列表
        in: path
        required: true
        schema:
          type: string
    get:
      summary: 获取构建任务详情
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuildTask"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
    delete:
      summary: 删除构建任务（整体事务）
      description: |
        整体事务语义：所有 id 通过预校验后才进入删除阶段，任一预校验失败整批不删。

        预校验顺序：

        1. 任一 id 处于 `running` / `stopping` → 409 `VegaBackend.BuildTask.HasRunningExecution`，
           `error_details` 携带 `{ running_ids: [...] }`。状态拦截**不可绕过**，必须先 stop 再删。
        2. 任一 id 不存在（且未启用 `ignore_missing`）→ 404 `VegaBackend.BuildTask.NotFound`，
           `error_details` 携带 `{ missing_ids: [...] }`。
        3. 全部通过 → 逐条删除，返回 204。
      parameters:
        - name: ignore_missing
          description: |
            放宽不存在性检查：缺失 id 视为已删除（静默跳过），其它 id 正常删。
            **不影响** running/stopping 拦截。
          in: query
          schema:
            type: boolean
            default: false
        - name: delete_active_index
          description: 是否删除当前活跃索引；默认 `false`
          in: query
          schema:
            type: boolean
            default: false
      responses:
        "204":
          description: 删除成功
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /build-tasks/{id}/start:
    parameters:
      - name: id
        description: BuildTask ID
        in: path
        required: true
        schema:
          type: string
    post:
      summary: 启动构建任务
      description: |
        合法状态转移：`status ∈ {init, stopped, completed, failed}` → `running`。
        `failed` 允许重启：从 `synced_mark` 水位继续（batch incremental），
        无需删除重建；worker 实际开始执行时会清空 `error_msg`。

        **响应 status 滞后**：HTTP 202 表示"启动指令已被接受并入队"，**不**表示
        status 已切换为 `running`。worker 实际执行时才会写为 `running`，
        客户端如需确认应轮询 GET。响应 body 为空。

        **非幂等**：对已 running / stopping 的 task 再次 start 返回 409
        `VegaBackend.BuildTask.InvalidStateTransition`。
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartBuildTaskRequest"
      responses:
        "202":
          description: 启动指令已接受（body 为空）
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /build-tasks/{id}/stop:
    parameters:
      - name: id
        description: BuildTask ID
        in: path
        required: true
        schema:
          type: string
    post:
      summary: 停止构建任务
      description: |
        合法状态转移：
        - `running` → `stopping`：正常停止，worker 在批间检查点退出后写 `stopped`。
        - `stopping` → `stopped`：强制完结。worker 已不在（重试耗尽 / 服务重启）时
          `stopping` 不会被自动推进，再次调 stop 直接落停，使任务可删除。

        **响应 status 滞后**：HTTP 202 表示"停止指令已被记录"。`stopping → stopped`
        由 worker 异步推进，客户端可轮询 GET 拿最新 status。响应 body 为空。

        **非幂等**：对非 running / stopping 状态的 task 调 stop 返回 409
        `VegaBackend.BuildTask.InvalidStateTransition`。
      responses:
        "202":
          description: 停止指令已接受（body 为空）
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"
components:
  securitySchemes:
    OAuth2:
      $ref: "../_shared/auth.yaml#/components/securitySchemes/OAuth2"
  responses:
    BadRequest:
      description: 请求参数 / 请求体非法
      content:
        application/json:
          schema:
            $ref: "../_shared/errors.yaml#/components/schemas/Error"
    Unauthorized:
      description: 未授权（OAuth Token 校验失败）
      content:
        application/json:
          schema:
            $ref: "../_shared/errors.yaml#/components/schemas/Error"
    NotFound:
      description: 资源不存在
      content:
        application/json:
          schema:
            $ref: "../_shared/errors.yaml#/components/schemas/Error"
    NotAcceptable:
      description: Content-Type 不是 application/json
      content:
        application/json:
          schema:
            $ref: "../_shared/errors.yaml#/components/schemas/Error"
    Conflict:
      description: |
        状态冲突：状态机不允许该转移，或 task 处于 running/stopping 无法删除
      content:
        application/json:
          schema:
            $ref: "../_shared/errors.yaml#/components/schemas/Error"
    InternalServerError:
      description: 服务内部错误
      content:
        application/json:
          schema:
            $ref: "../_shared/errors.yaml#/components/schemas/Error"
  schemas:
    AccountInfo:
      description: 操作者信息
      type: object
      required:
        - id
        - type
      properties:
        id:
          description: 账户 ID
          type: string
        type:
          description: 账户类型
          type: string
        name:
          description: 显示名
          type: string
    BuildTask:
      description: 构建任务实体
      type: object
      required:
        - id
        - resource_id
        - catalog_id
        - status
        - mode
        - total_count
        - synced_count
        - vectorized_count
        - creator
        - create_time
        - update_time
      properties:
        id:
          description: 全局唯一 ID
          type: string
        resource_id:
          description: 关联 Resource ID
          type: string
        catalog_id:
          description: 关联 Catalog ID（冗余存储以加速过滤）
          type: string
        status:
          description: 状态
          type: string
          enum:
            - init
            - running
            - stopping
            - stopped
            - completed
            - failed
        mode:
          description: 任务模式
          type: string
          enum:
            - streaming
            - batch
        total_count:
          description: 总数
          type: integer
          format: int64
        synced_count:
          description: 已同步数
          type: integer
          format: int64
        vectorized_count:
          description: 已向量化数
          type: integer
          format: int64
        synced_mark:
          description: 同步标记（增量构建用）
          type: string
        error_msg:
          description: 错误信息（仅在 failed 状态下有意义）
          type: string
        creator:
          $ref: "#/components/schemas/AccountInfo"
        create_time:
          description: 创建时间，毫秒级时间戳
          type: integer
          format: int64
        update_time:
          description: 更新时间，毫秒级时间戳
          type: integer
          format: int64
        failure_detail:
          description: 任务完成但存在部分向量化失败时的明细
          type: string
        index_config:
          $ref: "#/components/schemas/BuildTaskIndexConfig"
        index_health:
          $ref: "#/components/schemas/IndexHealth"
    BuildTaskIndexConfig:
      description: 创建任务时从 Resource 派生的索引配置快照
      type: object
      properties:
        build_key_fields:
          type: array
          items:
            type: string
        features:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/BuildTaskFieldIndexFeature"
    BuildTaskFieldIndexFeature:
      type: object
      properties:
        vector:
          type: object
          required:
            - model_id
            - dimensions
          properties:
            model_id:
              type: string
            dimensions:
              type: integer
        fulltext:
          type: object
          properties:
            analyzer:
              type: string
    IndexHealth:
      description: 索引派生健康状态；不持久化
      type: object
      required:
        - embedding
        - fulltext
        - usable
      properties:
        embedding:
          type: string
          enum:
            - none
            - building
            - ok
            - partial
            - failed
        fulltext:
          type: string
          enum:
            - none
            - ok
        usable:
          type: boolean
    CreateBuildTaskRequest:
      description: 创建构建任务请求体
      type: object
      required:
        - resource_id
        - mode
      properties:
        resource_id:
          description: 关联 Resource ID（必填）
          type: string
        mode:
          description: 任务模式
          type: string
          enum:
            - streaming
            - batch
        execute_type:
          description: batch 执行类型；省略时服务端默认 `full`
          type: string
          enum:
            - incremental
            - full
    StartBuildTaskRequest:
      description: 启动构建任务请求体（可选）
      type: object
      properties:
        reset:
          description: 为 true 时忽略已有 `synced_mark`，从头执行
          type: boolean
          default: false
    ListBuildTasks:
      description: 构建任务列表
      type: object
      required:
        - entries
        - total_count
      properties:
        entries:
          description: 条目列表
          type: array
          items:
            $ref: "#/components/schemas/BuildTask"
        total_count:
          description: 总条数
          type: integer
          format: int64
