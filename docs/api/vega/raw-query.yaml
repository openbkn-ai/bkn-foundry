---
openapi: 3.1.1
info:
  title: Raw Query
  description: |
    Vega Backend 原生查询端点（`POST /resources/query`）相关 API。

    本端点把 query 透传给底层连接器执行，**不做结构化 filter 解析**：

    - SQL 引擎（mysql / postgresql / clickhouse / 达梦 / oracle）→ `query` 字段为 SQL 字符串
    - 索引引擎（opensearch / elasticsearch）→ `query` 字段为 DSL JSON 对象

    与 `POST /resources/{id}/data`（[resource-data.yaml](resource-data.yaml)）的分工：

    | 维度 | `POST /resources/query` | `POST /resources/{id}/data` (Override:GET) |
    |---|---|---|
    | 主键 | 无（不绑定 resource） | 绑定 `:id` |
    | 输入 | 原生 SQL / DSL + format/dialect | 结构化 `filter_condition` + 分页 |
    | 输出 | 列元数据 + raw entries + 流式 cursor | 文档对象 + 可选 total_count |
    | Cursor | `paging.cursor` / `paging.next_cursor` | ❌ |
    | 用途 | 跨 resource 联表 / 复杂 SQL / 流式大数据 | 应用层结构化访问 |

    **安全说明**：本端点把原生 SQL/DSL 直传给底层数据源，是高权限能力。调用方应当
    受 RBAC 约束；外部 OAuth 调用方建议在网关层做白名单 / 限流。
  version: 0.1.0
servers:
  - url: /api/vega-backend/v1
security:
  - OAuth2: []
paths:
  /resources/query:
    post:
      summary: 执行原生查询（SQL 或 DSL）
      description: |
        **请求体的 `query` 字段类型由 `query_format` 和 `input_dialect` 决定**：

        - SQL：`{"query":"SELECT * FROM {{resource_id}}", "query_format":"sql", "input_dialect":"postgres"}`
        - OpenSearch DSL：`{"query":{"resource_id":"...","query":{"match_all":{}}}, "query_format":"dsl", "input_dialect":"opensearch"}`

        实际执行连接器始终从 Resource/Catalog 推导，客户端不能通过输入方言选择数据源。

        OpenSearch DSL 使用 `paging.mode: cursor` 时必须提供非空 `sort`。客户端提交的
        `search_after` 会被服务端忽略；该位置仅由服务端保存在不透明 cursor 中。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RawQueryRequest"
      responses:
        "200":
          description: 查询成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RawQueryResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "406":
          $ref: "#/components/responses/NotAcceptable"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"
components:
  securitySchemes:
    OAuth2:
      $ref: "../_shared/auth.yaml#/components/securitySchemes/OAuth2"
  responses:
    BadRequest:
      description: |
        请求参数 / 请求体非法。常见 errcode：
        - `VegaBackend.InvalidParameter.RequestBody`：body schema 不合法
        - `VegaBackend.Query.InvalidParameter`：`query_format`、`input_dialect` 或 paging 参数非法
        - `VegaBackend.Query.InvalidParameter.QueryTimeout`：`query_timeout_sec` 超出 [1, 3600]
      content:
        application/json:
          schema:
            $ref: "../_shared/errors.yaml#/components/schemas/Error"
    Unauthorized:
      description: 未授权（OAuth Token 校验失败）
      content:
        application/json:
          schema:
            $ref: "../_shared/errors.yaml#/components/schemas/Error"
    Forbidden:
      description: cursor 所属调用方无权限，或资源 / Catalog 权限已变更。
      content:
        application/json:
          schema:
            $ref: "../_shared/errors.yaml#/components/schemas/Error"
    NotFound:
      description: cursor 不存在、已过期或已完成。
      content:
        application/json:
          schema:
            $ref: "../_shared/errors.yaml#/components/schemas/Error"
    NotAcceptable:
      description: Content-Type 不是 application/json
      content:
        application/json:
          schema:
            $ref: "../_shared/errors.yaml#/components/schemas/Error"
    Conflict:
      description: Catalog 被禁用、资源不可查询或 cursor 指向的 Catalog 已变化。
      content:
        application/json:
          schema:
            $ref: "../_shared/errors.yaml#/components/schemas/Error"
    InternalServerError:
      description: |
        服务内部错误。常见 errcode：
        - `VegaBackend.Query.ExecuteFailed`：底层连接器执行查询失败（SQL 语法、权限、超时等）
      content:
        application/json:
          schema:
            $ref: "../_shared/errors.yaml#/components/schemas/Error"
  schemas:
    RawQueryRequest:
      description: 原生查询请求
      type: object
      oneOf:
        - required: [query, query_format]
        - required: [paging]
      properties:
        query:
          description: |
            查询语句。类型依赖 `query_format`：
            - SQL 引擎用字符串
            - 索引引擎（OpenSearch/Elasticsearch）用 JSON 对象
          oneOf:
            - type: string
              description: SQL 字符串（mysql / postgresql 等）
            - type: object
              description: DSL JSON 对象（OpenSearch / Elasticsearch）
              additionalProperties: true
        query_format:
          description: 输入载体类型。
          type: string
          enum:
            - sql
            - dsl
        input_dialect:
          description: SQL 输入方言；SQL 省略时默认 `postgres`。DSL 首发必须是 `opensearch`。
          type: string
          examples:
            - postgres
            - mysql
            - trino
            - duckdb
            - opensearch
        paging:
          $ref: "#/components/schemas/PagingRequest"
        query_timeout_sec:
          description: 单页查询超时（秒），仅首次请求可设置；cursor 续页沿用首次请求的值。[1, 3600]，默认 60。
          type: integer
          format: int64
          minimum: 1
          maximum: 3600
          default: 60
    PagingRequest:
      type: object
      properties:
        mode:
          type: string
          enum: [single, cursor]
          default: single
        limit:
          type: integer
          description: 单次最多返回条数；cursor 首次请求必填，范围 [1, 10000]。single 模式省略时使用默认值。
          minimum: 1
          maximum: 10000
        offset:
          description: 仅首次请求可用的起始偏移，适用于 single 和 cursor 的第一页；续页只能传 paging.cursor。
          type: integer
          minimum: 0
        keep_alive_sec:
          description: cursor 成功取页后的空闲租约秒数；仅首次 cursor 请求可设置。省略时默认 1800，取值范围 [1, 3600]。
          type: integer
          minimum: 1
          maximum: 3600
        cursor:
          type: string
    RawQueryResponse:
      description: 原生查询响应
      type: object
      required:
        - columns
        - entries
        - stats
        - total_count
      properties:
        columns:
          description: 列元数据
          type: array
          items:
            $ref: "#/components/schemas/ColumnInfo"
        entries:
          description: 查询结果（每条为一行/一个文档，结构开放）
          type: array
          items:
            type: object
            additionalProperties: true
        stats:
          $ref: "#/components/schemas/QueryStats"
        total_count:
          description: 总条数（标准查询返回完整命中数；流式查询为已返回累计数）
          type: integer
          format: int64
        warnings:
          description: 非阻断告警
          type: array
          items:
            type: string
        paging:
          $ref: "#/components/schemas/PagingResponse"
    PagingResponse:
      description: cursor 分页状态。末页时两个字段均为 null。
      type: object
      required:
        - next_cursor
        - expires_at_sec
      properties:
        next_cursor:
          type: [string, "null"]
          description: 下一页使用的不透明游标；为空表示已到末页。
        expires_at_sec:
          type: [integer, "null"]
          format: int64
          description: cursor 空闲租约的到期 Unix 时间戳（秒）；每次成功且仍有下一页时刷新。
    ColumnInfo:
      description: 列元数据
      type: object
      required:
        - name
        - type
      properties:
        name:
          description: 列名
          type: string
        type:
          description: 列类型（取决于底层连接器）
          type: string
    QueryStats:
      description: 查询统计
      type: object
      required:
        - is_timeout
      properties:
        is_timeout:
          description: 是否因 query_timeout_sec 触发超时
          type: boolean
