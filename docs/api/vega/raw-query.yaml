---
openapi: 3.1.1
info:
  title: Raw Query
  description: |
    Vega Backend 原生查询端点（`POST /resources/query`）相关 API。

    本端点把 query 透传给底层连接器执行，**不做结构化 filter 解析**：

    - SQL 引擎（mysql / postgresql / clickhouse / 达梦 / oracle）→ `query` 字段为 SQL 字符串
    - 索引引擎（opensearch / elasticsearch）→ `query` 字段为 DSL JSON 对象

    与 `POST /resources/{id}/data`（[resource-data.yaml](resource-data.yaml)）的分工：

    | 维度 | `POST /resources/query` | `POST /resources/{id}/data` (Override:GET) |
    |---|---|---|
    | 主键 | 无（不绑定 resource） | 绑定 `:id` |
    | 输入 | 原生 SQL / DSL + `resource_type` | 结构化 `filter_condition` + 分页 |
    | 输出 | 列元数据 + raw entries + 流式 cursor | 文档对象 + 可选 total_count |
    | 流式 | ✅ `query_type=stream` + `query_id` 游标 | ❌ |
    | 用途 | 跨 resource 联表 / 复杂 SQL / 流式大数据 | 应用层结构化访问 |

    **安全说明**：本端点把原生 SQL/DSL 直传给底层数据源，是高权限能力。调用方应当
    受 RBAC 约束；外部 OAuth 调用方建议在网关层做白名单 / 限流。
  version: 0.1.0
servers:
  - url: /api/vega-backend/v1
paths:
  /api/vega-backend/v1/resources/query:
    post:
      summary: 执行原生查询（SQL 或 DSL）
      description: |
        **请求体的 `query` 字段类型依赖 `resource_type`**：

        - `mysql` / `postgresql` / `clickhouse` / `dameng` / `oracle` → SQL 字符串
          示例：`{"query": "SELECT * FROM t WHERE id = 1", "resource_type": "mysql"}`
        - `opensearch` / `elasticsearch` → DSL JSON 对象
          示例：`{"query": {"query": {"match_all": {}}}, "resource_type": "opensearch"}`

        **流式查询**：`query_type=stream` 启用游标模式。首次请求不带 `query_id`，
        服务端在响应 `stats.query_id` 中返回；后续请求携带该 `query_id` 继续游标，
        直到 `stats.has_more=false`。流式仅 OpenSearch 提供 search_after 语义。

        **支持的 `resource_type`** 由 `interfaces.GetSupportedConnectorTypesForQuery()`
        定义；不在白名单内返回 400 `VegaBackend.InvalidParameter.ResourceType`。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RawQueryRequest"
      responses:
        "200":
          description: 查询成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RawQueryResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "406":
          $ref: "#/components/responses/NotAcceptable"
        "500":
          $ref: "#/components/responses/InternalServerError"
components:
  responses:
    BadRequest:
      description: |
        请求参数 / 请求体非法。常见 errcode：
        - `VegaBackend.InvalidParameter.RequestBody`：body schema 不合法
        - `VegaBackend.InvalidParameter.ResourceType`：`resource_type` 缺失或不在白名单
        - `VegaBackend.InvalidParameter.StreamSize`：`stream_size` 超出 [100, 10000]
        - `VegaBackend.Query.InvalidParameter.QueryTimeout`：`query_timeout` 超出 [1, 3600]
      content:
        application/json:
          schema:
            $ref: "../_shared/errors.yaml#/components/schemas/Error"
    Unauthorized:
      description: 未授权（OAuth Token 校验失败）
      content:
        application/json:
          schema:
            $ref: "../_shared/errors.yaml#/components/schemas/Error"
    NotAcceptable:
      description: Content-Type 不是 application/json
      content:
        application/json:
          schema:
            $ref: "../_shared/errors.yaml#/components/schemas/Error"
    InternalServerError:
      description: |
        服务内部错误。常见 errcode：
        - `VegaBackend.Query.ExecuteFailed`：底层连接器执行查询失败（SQL 语法、权限、超时等）
      content:
        application/json:
          schema:
            $ref: "../_shared/errors.yaml#/components/schemas/Error"
  schemas:
    RawQueryRequest:
      description: 原生查询请求
      type: object
      required:
        - query
        - resource_type
      properties:
        query:
          description: |
            查询语句。类型依赖 `resource_type`：
            - SQL 引擎用字符串
            - 索引引擎（OpenSearch/Elasticsearch）用 JSON 对象
          oneOf:
            - type: string
              description: SQL 字符串（mysql / postgresql 等）
            - type: object
              description: DSL JSON 对象（OpenSearch / Elasticsearch）
              additionalProperties: true
        query_type:
          description: 查询类型；`stream` 启用游标，需配合 `query_id` / `stats.has_more`
          type: string
          enum:
            - standard
            - stream
          default: standard
        query_id:
          description: |
            流式查询游标 ID。首次请求留空，服务端在响应 `stats.query_id` 中返回；
            后续请求带上该 ID 继续游标。
          type: string
        resource_type:
          description: |
            底层连接器类型，决定 query 字段如何解释。
            支持值由后端 `GetSupportedConnectorTypesForQuery()` 配置。
          type: string
          examples:
            - mysql
            - postgresql
            - opensearch
        stream_size:
          description: 流式查询每批数据量，[100, 10000]，默认 10000
          type: integer
          format: int64
          minimum: 100
          maximum: 10000
          default: 10000
        query_timeout:
          description: 查询超时（秒），[1, 3600]，默认 60
          type: integer
          format: int64
          minimum: 1
          maximum: 3600
          default: 60
    RawQueryResponse:
      description: 原生查询响应
      type: object
      required:
        - columns
        - entries
        - stats
        - total_count
      properties:
        columns:
          description: 列元数据
          type: array
          items:
            $ref: "#/components/schemas/ColumnInfo"
        entries:
          description: 查询结果（每条为一行/一个文档，结构开放）
          type: array
          items:
            type: object
            additionalProperties: true
        stats:
          $ref: "#/components/schemas/QueryStats"
        total_count:
          description: 总条数（标准查询返回完整命中数；流式查询为已返回累计数）
          type: integer
          format: int64
    ColumnInfo:
      description: 列元数据
      type: object
      required:
        - name
        - type
      properties:
        name:
          description: 列名
          type: string
        type:
          description: 列类型（取决于底层连接器）
          type: string
    QueryStats:
      description: 查询统计 / 流式 cursor 状态
      type: object
      required:
        - is_timeout
        - has_more
        - offset
      properties:
        is_timeout:
          description: 是否因 query_timeout 触发超时
          type: boolean
        query_id:
          description: |
            流式查询 ID。流式首次响应时由服务端生成；客户端在后续请求里回传
            以继续游标。标准查询时为空。
          type: string
        has_more:
          description: 是否还有更多数据（流式查询用；标准查询恒为 false）
          type: boolean
        search_after:
          description: |
            OpenSearch 流式查询的 search_after 值；服务端内部使用，客户端透传即可。
          type: array
          items: {}
        offset:
          description: 已获取到的累计数据条数（流式查询模式）
          type: integer
