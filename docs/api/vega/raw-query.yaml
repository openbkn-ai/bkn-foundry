---
openapi: 3.1.1
info:
  title: Raw Query
  description: |
    Vega Backend 原生查询端点（`POST /resources/query`）相关 API。

    本端点执行经服务端校验和资源绑定的原生查询，**不做结构化 filter 解析**：

    - SQL 引擎（mysql / postgresql / clickhouse / 达梦 / oracle）→ `query` 字段为 SQL 字符串
    - 索引引擎（opensearch / elasticsearch）→ `query` 字段为 DSL JSON 对象

    与 `POST /resources/{id}/data`（[resource-data.yaml](resource-data.yaml)）的分工：

    | 维度 | `POST /resources/query` | `POST /resources/{id}/data` (Override:GET) |
    |---|---|---|
    | 资源定位 | SQL 使用受控 `{{resource_id}}` 占位符；DSL 使用顶层 `resource_id` | 绑定 `:id` |
    | 输入 | 原生 SQL / DSL + format/dialect | 结构化 `filter_condition` + 分页 |
    | 输出 | 列元数据 + raw entries + cursor 分页 | 文档对象 + 可选 total_count + cursor 分页 |
    | Cursor | `paging.cursor` / `paging.next_cursor` | `paging.cursor` / `paging.next_cursor` |
    | 用途 | 同一 Catalog 内的复杂 SQL / DSL | 应用层结构化访问 |

    **安全说明**：SQL 只允许单条顶层 `SELECT`，且所有物理表必须由受权限保护的
    Resource 占位符解析；DSL 的索引同样只能由 Resource 推导。调用方仍应受 RBAC
    与限流约束，底层账号必须保持只读。
  version: 0.1.0
servers:
  - url: /api/vega-backend/v1
security:
  - OAuth2: []
paths:
  /resources/query:
    post:
      summary: 执行原生查询（SQL 或 DSL）
      description: |
        **请求体的 `query` 字段类型由 `query_format` 和 `input_dialect` 决定**：

        - SQL：`{"query":"SELECT * FROM {{resource_id}}", "query_format":"sql", "input_dialect":"postgres"}`
        - OpenSearch DSL：`{"query":{"resource_id":"...","query":{"match_all":{}}}, "query_format":"dsl", "input_dialect":"opensearch"}`

        实际执行连接器始终从 Resource/Catalog 推导，客户端不能通过输入方言选择数据源。

        OpenSearch DSL 使用 `paging.mode: cursor` 时必须提供非空 `sort`。客户端提交的
        `search_after` 会被服务端忽略；该位置仅由服务端保存在不透明 cursor 中。排序应
        包含稳定且唯一的 tiebreaker，避免相同排序值跨页重复或遗漏。

        OpenSearch 聚合 DSL 仅支持 `paging.mode: single`，服务端强制 `size: 0`，并将
        metric、terms/date_histogram 及其单链嵌套 bucket 展开为逐行 `entries`。不能
        转换为行结构的聚合在访问 OpenSearch 前返回 400；`paging.offset/limit` 应用于
        展开后的行结果，cursor 模式不支持聚合。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RawQueryRequest"
      responses:
        "200":
          description: 查询成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RawQueryResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "406":
          $ref: "#/components/responses/NotAcceptable"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalServerError"
components:
  securitySchemes:
    OAuth2:
      $ref: "../_shared/auth.yaml#/components/securitySchemes/OAuth2"
  responses:
    BadRequest:
      description: |
        请求参数 / 请求体非法。常见 errcode：
        - `VegaBackend.InvalidParameter.RequestBody`：body schema 不合法
        - `VegaBackend.Query.InvalidParameter`：`query_format`、`input_dialect` 或 paging 参数非法
        - `VegaBackend.Query.InvalidParameter.QueryTimeout`：`query_timeout_sec` 超出 [1, 3600]
      content:
        application/json:
          schema:
            $ref: "../_shared/errors.yaml#/components/schemas/Error"
    Unauthorized:
      description: 未授权（OAuth Token 校验失败）
      content:
        application/json:
          schema:
            $ref: "../_shared/errors.yaml#/components/schemas/Error"
    Forbidden:
      description: cursor 所属调用方无权限，或资源 / Catalog 权限已变更。
      content:
        application/json:
          schema:
            $ref: "../_shared/errors.yaml#/components/schemas/Error"
    NotFound:
      description: cursor 不存在、已过期或已完成。
      content:
        application/json:
          schema:
            $ref: "../_shared/errors.yaml#/components/schemas/Error"
    NotAcceptable:
      description: Content-Type 不是 application/json
      content:
        application/json:
          schema:
            $ref: "../_shared/errors.yaml#/components/schemas/Error"
    Conflict:
      description: Catalog 被禁用、资源不可查询或 cursor 指向的 Catalog 已变化。
      content:
        application/json:
          schema:
            $ref: "../_shared/errors.yaml#/components/schemas/Error"
    TooManyRequests:
      description: Cursor session 数量达到全局上限；请稍后重试或等待已有 cursor 过期。
      content:
        application/json:
          schema:
            $ref: "../_shared/errors.yaml#/components/schemas/Error"
    InternalServerError:
      description: |
        服务内部错误。常见 errcode：
        - `VegaBackend.Query.ExecuteFailed`：底层连接器执行查询失败（SQL 语法、权限、超时等）
      content:
        application/json:
          schema:
            $ref: "../_shared/errors.yaml#/components/schemas/Error"
  schemas:
    RawQueryRequest:
      description: 原生查询请求
      type: object
      oneOf:
        - required: [query, query_format]
        - required: [paging]
      properties:
        query:
          description: |
            查询语句。类型依赖 `query_format`：
            - SQL 引擎用字符串
            - 索引引擎（OpenSearch/Elasticsearch）用 JSON 对象
          oneOf:
            - type: string
              description: SQL 字符串（mysql / postgresql 等）
            - type: object
              description: DSL JSON 对象（OpenSearch / Elasticsearch）
              additionalProperties: true
        query_format:
          description: 输入载体类型。
          type: string
          enum:
            - sql
            - dsl
        input_dialect:
          description: SQL 输入方言；SQL 省略时默认 `postgres`。DSL 首发必须是 `opensearch`。
          type: string
          examples:
            - postgres
            - mysql
            - trino
            - duckdb
            - opensearch
        paging:
          $ref: "#/components/schemas/PagingRequest"
        query_timeout_sec:
          description: 单页查询超时（秒），仅首次请求可设置；cursor 续页沿用首次请求的值。[1, 3600]，默认 60。
          type: integer
          format: int64
          minimum: 1
          maximum: 3600
          default: 60
        need_total:
          description: 是否需要完整总数。仅为 true 时响应包含 total_count；cursor 首次请求的值会由服务端冻结并用于所有续页，续页携带的值不改变该行为。
          type: boolean
          default: false
    PagingRequest:
      type: object
      properties:
        mode:
          type: string
          enum: [single, cursor]
          default: single
        limit:
          type: integer
          description: 单次最多返回条数；cursor 首次请求必填，范围 [1, 10000]。single 模式省略时使用默认值。
          minimum: 1
          maximum: 10000
        offset:
          description: 仅首次请求可用的起始偏移，适用于 single 和 cursor 的第一页；续页只能传 paging.cursor。非聚合 OpenSearch DSL 要求 offset + limit 不超过 10000。
          type: integer
          minimum: 0
        keep_alive_sec:
          description: cursor 成功取页后的空闲租约秒数；首次 cursor 请求时取值范围 [1, 3600]，single 模式下忽略。省略时默认 1800。
          type: integer
          minimum: 1
          maximum: 3600
        cursor:
          type: string
    RawQueryResponse:
      description: 原生查询响应
      type: object
      required:
        - columns
        - entries
      properties:
        columns:
          description: 列元数据
          type: array
          items:
            $ref: "#/components/schemas/ColumnInfo"
        entries:
          description: 查询结果（每条为一行/一个文档；支持的 OpenSearch 聚合也展开为逐行结果）
          type: array
          items:
            type: object
            additionalProperties: true
        total_count:
          description: 当前查询完整命中数；仅 need_total=true 时返回，cursor 的每一页返回同一个冻结总数。
          type: integer
          format: int64
        warnings:
          description: 非阻断告警
          type: array
          items:
            type: string
        paging:
          $ref: "#/components/schemas/PagingResponse"
    PagingResponse:
      description: cursor 分页状态。末页时两个字段均为 null。
      type: object
      required:
        - next_cursor
        - expires_at_sec
      properties:
        next_cursor:
          type: [string, "null"]
          description: 下一页使用的不透明游标；为空表示已到末页。
        expires_at_sec:
          type: [integer, "null"]
          format: int64
          description: cursor 空闲租约的到期 Unix 时间戳（秒）；每次成功且仍有下一页时刷新。
    ColumnInfo:
      description: 列元数据
      type: object
      required:
        - name
        - type
      properties:
        name:
          description: 列名
          type: string
        type:
          description: 列类型（取决于底层连接器）
          type: string
