              schema:
                $ref: '#/components/schemas/PromptVersionList'
        4XX:
          description: 平台错误封套（400 参数/401 身份/404 不存在/409 冲突）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/bkn-agent/v1/prompts/{prompt_id}/rollback:
    post:
      tags:
      - BknAgent
      summary: Rollback
      operationId: rollback_api_bkn_agent_v1_prompts__prompt_id__rollback_post
      parameters:
      - name: prompt_id
        in: path
        required: true
        schema:
          type: string
          title: Prompt Id
      requestBody:
        required: true
