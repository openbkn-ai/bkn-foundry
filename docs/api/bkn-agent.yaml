      tags:
      - BknAgent
      summary: Get Task
      operationId: get_task_api_bkn_agent_v1_tasks__task_id__get
      parameters:
      - name: task_id
        in: path
        required: true
        schema:
          type: string
          title: Task Id
      responses:
        '200':
          description: Successful Response
          content:
