  /api/v1/health:
    get:
      summary: Health
      operationId: health_api_v1_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
components:
  schemas:
    AgentDeleted:
      properties:
        deleted:
          type: string
          title: Deleted
      type: object
      required:
      - deleted
      title: AgentDeleted
    AgentExportItem:
      properties:
        agent_id:
          type: string
          title: Agent Id
        spec:
          $ref: '#/components/schemas/AgentSpec'
        prompt:
          anyOf:
          - $ref: '#/components/schemas/PromptExport'
          - type: 'null'
      type: object
      required:
      - agent_id
      - spec
      title: AgentExportItem
    AgentLimits:
      properties:
        max_turns:
          anyOf:
          - type: integer
            maximum: 200.0
            minimum: 1.0
          - type: 'null'
          title: Max Turns
        max_tool_calls:
          anyOf:
          - type: integer
            maximum: 500.0
            minimum: 0.0
          - type: 'null'
          title: Max Tool Calls
        timeout_s:
          anyOf:
          - type: integer
            maximum: 3600.0
            minimum: 1.0
          - type: 'null'
          title: Timeout S
      type: object
      title: AgentLimits
    AgentList:
      properties:
        items:
          items:
            $ref: '#/components/schemas/AgentOut'
          type: array
          title: Items
        total:
          type: integer
          title: Total
        page:
          type: integer
          title: Page
        size:
          type: integer
          title: Size
      type: object
      required:
      - items
      - total
      - page
      - size
      title: AgentList
    AgentOut:
      properties:
        name:
          type: string
          maxLength: 100
          minLength: 1
          pattern: ^[0-9A-Za-z_一-鿿]+$
          title: Name
        mode:
          type: string
          enum:
          - chat
          - task
          title: Mode
          default: chat
        prompt_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Prompt Id
        prompt_vars_schema:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Prompt Vars Schema
        model:
          type: string
          title: Model
          default: ''
        tools:
          items:
            additionalProperties: true
            type: object
          type: array
          title: Tools
        skills:
          items:
            type: string
          type: array
          title: Skills
        limits:
          anyOf:
          - $ref: '#/components/schemas/AgentLimits'
          - type: 'null'
        status:
          type: string
          enum:
          - draft
          - published
          title: Status
          default: draft
        agent_id:
          type: string
          title: Agent Id
        create_user:
          type: string
          title: Create User
        update_user:
          type: string
          title: Update User
        create_time:
          type: integer
          title: Create Time
        update_time:
          type: integer
          title: Update Time
      type: object
      required:
      - name
      - agent_id
      - create_user
      - update_user
      - create_time
      - update_time
      title: AgentOut
    AgentSpec:
      properties:
        name:
          type: string
          maxLength: 100
          minLength: 1
          pattern: ^[0-9A-Za-z_一-鿿]+$
          title: Name
        mode:
          type: string
          enum:
          - chat
          - task
          title: Mode
          default: chat
        prompt_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Prompt Id
        prompt_vars_schema:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Prompt Vars Schema
        model:
          type: string
          title: Model
          default: ''
        tools:
          items:
            additionalProperties: true
            type: object
          type: array
          title: Tools
        skills:
          items:
            type: string
          type: array
          title: Skills
        limits:
          anyOf:
          - $ref: '#/components/schemas/AgentLimits'
          - type: 'null'
        status:
          type: string
          enum:
          - draft
          - published
          title: Status
          default: draft
      type: object
      required:
      - name
      title: AgentSpec
    ChatRequest:
      properties:
        agent_id:
          type: string
          title: Agent Id
        thread_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Thread Id
        message:
          type: string
          minLength: 1
          title: Message
        skills:
          items:
            type: string
          type: array
          title: Skills
        prompt_override:
          anyOf:
          - type: string
          - type: 'null'
          title: Prompt Override
        prompt_vars:
          additionalProperties: true
          type: object
          title: Prompt Vars
      type: object
      required:
      - agent_id
      - message
      title: ChatRequest
    EffectivePromptOut:
      properties:
        source:
          type: string
          enum:
          - override
          - default
          title: Source
        content:
          type: string
          title: Content
        prompt_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Prompt Id
        version:
          anyOf:
          - type: integer
          - type: 'null'
          title: Version
      type: object
      required:
      - source
      - content
      title: EffectivePromptOut
    ErrorEnvelope:
      properties:
        code:
          type: string
          title: Code
        description:
          type: string
          title: Description
        detail:
          type: string
          title: Detail
        solution:
          type: string
          title: Solution
        link:
          type: string
          title: Link
          default: ''
      type: object
      required:
      - code
      - description
      - detail
      - solution
      title: ErrorEnvelope
      description: 平台统一错误封套（所有非 2xx 响应）。
    ExportPackage:
      properties:
        format:
          type: string
          const: bkn-agent/v1
          title: Format
          default: bkn-agent/v1
        exported_at:
          type: integer
          title: Exported At
        items:
          items:
            $ref: '#/components/schemas/AgentExportItem'
          type: array
          title: Items
      type: object
      required:
      - exported_at
      - items
      title: ExportPackage
    ExportRequest:
      properties:
        agent_ids:
          items:
            type: string
          type: array
          minItems: 1
          title: Agent Ids
      type: object
      required:
      - agent_ids
      title: ExportRequest
    ImportItemResult:
      properties:
        agent_id:
          type: string
          title: Agent Id
        name:
          type: string
          title: Name
        action:
          type: string
          enum:
          - created
          - updated
          - failed
          title: Action
        prompt_action:
          type: string
          enum:
          - created
          - version_published
          - unchanged
          - none
          title: Prompt Action
          default: none
        error:
          anyOf:
          - type: string
          - type: 'null'
          title: Error
      type: object
      required:
      - agent_id
      - name
      - action
      title: ImportItemResult
    ImportRequest:
      properties:
