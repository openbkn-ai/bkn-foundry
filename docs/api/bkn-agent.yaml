openapi: 3.1.0
info:
  title: bkn-agent
  version: 0.1.0
paths:
  /api/bkn-agent/v1/agents:
    post:
      tags:
      - BknAgent
      summary: Create Agent
      operationId: create_agent_api_bkn_agent_v1_agents_post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentSpec'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentOut'
        4XX:
          description: 平台错误封套（400 参数/401 身份/404 不存在/409 冲突）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    get:
      tags:
      - BknAgent
      summary: List Agents
      operationId: list_agents_api_bkn_agent_v1_agents_get
      parameters:
      - name: page
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          default: 1
          title: Page
      - name: size
        in: query
        required: false
        schema:
          type: integer
          maximum: 100
          minimum: 1
          default: 20
          title: Size
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentList'
        4XX:
          description: 平台错误封套（400 参数/401 身份/404 不存在/409 冲突）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/bkn-agent/v1/agents/{agent_id}:
    get:
      tags:
      - BknAgent
      summary: Get Agent
      operationId: get_agent_api_bkn_agent_v1_agents__agent_id__get
      parameters:
      - name: agent_id
        in: path
        required: true
        schema:
          type: string
          title: Agent Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentOut'
        4XX:
          description: 平台错误封套（400 参数/401 身份/404 不存在/409 冲突）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    put:
      tags:
      - BknAgent
      summary: Update Agent
      operationId: update_agent_api_bkn_agent_v1_agents__agent_id__put
      parameters:
      - name: agent_id
        in: path
        required: true
        schema:
          type: string
          title: Agent Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentSpec'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentOut'
        4XX:
          description: 平台错误封套（400 参数/401 身份/404 不存在/409 冲突）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    delete:
      tags:
      - BknAgent
      summary: Delete Agent
      operationId: delete_agent_api_bkn_agent_v1_agents__agent_id__delete
      parameters:
      - name: agent_id
        in: path
        required: true
        schema:
          type: string
          title: Agent Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentDeleted'
        4XX:
          description: 平台错误封套（400 参数/401 身份/404 不存在/409 冲突）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/bkn-agent/v1/chat:
    post:
      tags:
      - BknAgent
      summary: Chat
      operationId: chat_api_bkn_agent_v1_chat_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatRequest'
        required: true
      responses:
        '200':
          description: SSE 事件流：meta({thread_id, agent_id}) 先行；正文轮内 token({content})
            与 tool_call({name}) 交替；正常收尾 done({thread_id})；失败以 error({code, detail})
            收尾（错误不静默）。
          content:
            application/json:
              schema: {}
            text/event-stream:
              schema:
                type: string
        4XX:
          description: 平台错误封套（400 参数/401 身份/404 不存在/409 冲突）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/bkn-agent/v1/invoke/{agent_id}:
    post:
      tags:
      - BknAgent
      summary: Invoke
      description: '同步一次性执行，等到终态才返回（算子工厂 toolbox 工具经此调用）。


        仅 published agent 可调（draft 与不存在同响应）；chat/task 模式均可，

        执行为无状态单轮，不落 thread。任务记录照常落库可监控。'
      operationId: invoke_api_bkn_agent_v1_invoke__agent_id__post
      parameters:
      - name: agent_id
        in: path
        required: true
        schema:
          type: string
          title: Agent Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InvokeRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskOut'
        4XX:
          description: 平台错误封套（400 参数/401 身份/404 不存在/409 冲突）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/bkn-agent/v1/run:
    post:
      tags:
      - BknAgent
      summary: Run
      operationId: run_api_bkn_agent_v1_run_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RunRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskOut'
        4XX:
          description: 平台错误封套（400 参数/401 身份/404 不存在/409 冲突）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/bkn-agent/v1/tasks/{task_id}:
