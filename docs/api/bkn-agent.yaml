        4XX:
          description: 平台错误封套（400 参数/401 身份/404 不存在/409 冲突）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    get:
      tags:
      - BknAgent
      summary: List Prompts
      operationId: list_prompts_api_bkn_agent_v1_prompts_get
      parameters:
      - name: page
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          default: 1
          title: Page
      - name: size
        in: query
        required: false
        schema:
          type: integer
          maximum: 100
          minimum: 1
          default: 20
          title: Size
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromptList'
        4XX:
          description: 平台错误封套（400 参数/401 身份/404 不存在/409 冲突）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/bkn-agent/v1/prompts/{prompt_id}:
    get:
      tags:
      - BknAgent
      summary: Get Prompt
      operationId: get_prompt_api_bkn_agent_v1_prompts__prompt_id__get
      parameters:
      - name: prompt_id
        in: path
        required: true
        schema:
          type: string
          title: Prompt Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromptOut'
        4XX:
          description: 平台错误封套（400 参数/401 身份/404 不存在/409 冲突）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    put:
      tags:
      - BknAgent
      summary: Publish Version
      description: 发布新版本：写入 t_agent_prompt_version 并推进 current_version，立即全局生效。
      operationId: publish_version_api_bkn_agent_v1_prompts__prompt_id__put
      parameters:
      - name: prompt_id
        in: path
        required: true
        schema:
          type: string
          title: Prompt Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PromptPublish'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromptOut'
        4XX:
          description: 平台错误封套（400 参数/401 身份/404 不存在/409 冲突）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/bkn-agent/v1/prompts/{prompt_id}/versions:
    get:
      tags:
      - BknAgent
      summary: List Versions
      operationId: list_versions_api_bkn_agent_v1_prompts__prompt_id__versions_get
      parameters:
