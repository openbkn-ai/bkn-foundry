          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/bkn-agent/v1/agents/{agent_id}/prompt:
    get:
      tags:
      - BknAgent
      summary: Get Effective Prompt
      operationId: get_effective_prompt_api_bkn_agent_v1_agents__agent_id__prompt_get
      parameters:
      - name: agent_id
        in: path
        required: true
        schema:
          type: string
          title: Agent Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EffectivePromptOut'
        4XX:
          description: 平台错误封套（400 参数/401 身份/404 不存在/409 冲突）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    put:
      tags:
      - BknAgent
      summary: Put Override
      operationId: put_override_api_bkn_agent_v1_agents__agent_id__prompt_put
      parameters:
      - name: agent_id
        in: path
        required: true
        schema:
          type: string
          title: Agent Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OverridePut'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OverrideState'
        4XX:
          description: 平台错误封套（400 参数/401 身份/404 不存在/409 冲突）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    delete:
      tags:
      - BknAgent
      summary: Delete Override
      operationId: delete_override_api_bkn_agent_v1_agents__agent_id__prompt_delete
      parameters:
      - name: agent_id
        in: path
        required: true
        schema:
          type: string
          title: Agent Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OverrideDeleted'
        4XX:
          description: 平台错误封套（400 参数/401 身份/404 不存在/409 冲突）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/bkn-agent/v1/threads/{thread_id}:
    get:
      tags:
      - BknAgent
      summary: Get Thread
      operationId: get_thread_api_bkn_agent_v1_threads__thread_id__get
      parameters:
      - name: thread_id
        in: path
        required: true
        schema:
          type: string
          title: Thread Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThreadOut'
        4XX:
          description: 平台错误封套（400 参数/401 身份/404 不存在/409 冲突）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/bkn-agent/v1/export:
    post:
      tags:
      - BknAgent
      summary: Export Agents
      operationId: export_agents_api_bkn_agent_v1_export_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExportRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExportPackage'
        4XX:
          description: 平台错误封套（400 参数/401 身份/404 不存在/409 冲突）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/bkn-agent/v1/import:
    post:
      tags:
      - BknAgent
      summary: Import Agents
      operationId: import_agents_api_bkn_agent_v1_import_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImportRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportResult'
        4XX:
          description: 平台错误封套（400 参数/401 身份/404 不存在/409 冲突）
          content:
