---
openapi: 3.0.2
info:
  title: ActionType
  version: 0.1.0
paths:
  /api/bkn-backend/v1/knowledge-networks/{kn_id}/action-types:
    get:
      parameters:
        - name: kn_id
          description: 业务知识网络ID
          schema:
            type: string
          in: path
          required: true
        - name: name_pattern
          description: 根据络名称模糊查询，默认为空
          schema:
            type: string
          in: query
        - name: sort
          description: 排序类型，默认是update_time
          schema:
            enum:
              - update_time
              - name
            type: string
          in: query
        - name: direction
          description: |-
            排序结果方向，可选asc、desc。
            默认desc
          schema:
            enum:
              - asc
              - desc
            type: string
          in: query
        - name: offset
          description: "开始响应的项目的偏移量\t\n范围需大于等于0，默认值0"
          schema:
            format: int64
            type: integer
          in: query
        - name: limit
          description: |-
            每页最多可返回的项目数；
            分页可选1-1000，-1表示不分页；
            默认值10
          schema:
            format: int64
            type: integer
          in: query
        - name: tag
          description: 根据标签精准查询，默认为空.
          schema:
            type: string
          in: query
        - name: action_type
          description: |-
            **查询过滤**：按行动分类枚举筛选（与响应体中 `action_type` / `action_intent` 取值域相同）。
          schema:
            enum:
              - add
              - modify
              - delete
            type: string
          in: query
          required: false
        - name: object_type_id
          description: 绑定对象类
          schema:
            type: string
          in: query
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListActionTypes"
          description: ok
      summary: 获取行动类列表
    post:
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/override"
            examples:
              创建行动类:
                value:
                  - id: restart_pod
                    name: 重启pod
                    tags:
                      - 拓扑架构
                    comment: "当pod状态是unknown或者failed时,重启pod"
                    icon: ""
                    color: ""
                    branch: main
                    action_type: modify
                    action_intent: modify
                    object_type_id: pod
                    condition:
                      object_type_id: pod
                      field: pod_status
                      operation: in
                      value_from: const
                      value:
                        - Unknown
                        - Failed
                    impact_contracts:
                      - object_type_id: pod
                        expected_operation: modify
                        description: 重启 pod
                        affected_fields: []
                    action_source:
                      type: tool
                      box_id: tool_123
                      tool_id: box_123
                    parameters:
                      - name: pod
                        value_from: property
                        value: pod_name
                      - name: namespace
                        value_from: property
                        value: pod_namespace
                      - name: cmd_type
                        value_from: input
                        value: ""
                    schedule:
                      type: ""
                      expression: ""
                    module_type: action_type
              检索行动类-第一次请求:
                value:
                  need_total: true
                  limit: 1
                  condition:
                    operation: and
                    sub_conditions:
                      - field: comment
                        operation: match
                        value_from: const
                        value: pod
                      - field: "*"
                        operation: knn
                        value_from: const
                        value:
                          - pod
                          - 10
              检索行动类-非第一次请求:
                value:
                  search_after:
                    - 5.0170403
                    - restart_pod
                  need_total: true
                  limit: 1
                  condition:
                    operation: and
                    sub_conditions:
                      - field: comment
                        operation: match
                        value_from: const
                        value: pod
                      - field: "*"
                        operation: knn
                        value_from: const
                        value:
                          - pod
                          - 10
        required: true
      parameters:
        - name: kn_id
          description: 业务知识网络ID
          schema:
            type: string
          in: path
          required: true
        - name: import_mode
          description: 导入模式，可选normal、ignore、overwrite，默认为normal
          schema:
            enum:
              - normal
              - ignore
              - overwrite
            type: string
          in: query
        - name: strict_mode
          description: 是否严格校验依赖，默认为true。为true时，需校验绑定对象类、影响对象类等依赖是否存在；为false时，依赖不存在不报错
          schema:
            type: boolean
            default: true
          in: query
        - name: validate_dependency
          deprecated: true
          description: "[已废弃] 请使用 strict_mode。兼容保留，strict_mode 为空时会读取此参数"
          schema:
            type: boolean
            default: true
          in: query
        - name: x-http-method-override
          description: 重载请求头
          schema:
            enum:
              - POST
              - GET
            type: string
          in: header
          required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionTypeSearchResponse"
              examples:
                检索行动类-第一次请求:
                  value:
                    entries:
                      - id: restart_pod
                        name: 重启pod
                        tags:
                          - 拓扑架构
                        comment: "当pod状态是unknown或者failed时,重启pod"
                        icon: ""
                        color: ""
                        branch: main
                        detail: ""
                        creator: a0f02238-6cec-11f0-82bb-fa1c4529a151
                        create_time: 1757657606651
                        updater: a0f02238-6cec-11f0-82bb-fa1c4529a151
                        update_time: 1758098535626
                        kn_id: kn_system_incident_event_network
                        action_type: modify
                        action_intent: modify
                        object_type_id: pod
                        impact_contracts:
                          - object_type_id: pod
                            expected_operation: modify
                            description: 重启pod
                            affected_fields: []
                        object_type:
                          id: ""
                          name: ""
                          icon: ""
                          color: ""
                        condition:
                          object_type_id: pod
                          field: pod_status
                          operation: in
                          value_from: const
                          value:
                            - Unknown
                            - Failed
                        action_source:
                          type: tool
                          box_id: tool_123
                          tool_id: box_123
                        parameters:
                          - name: pod
                            value_from: property
                            value: pod_name
                          - name: namespace
                            value_from: property
                            value: pod_namespace
                          - name: cmd_type
                            value_from: input
                            value: ""
                        schedule:
                          type: ""
                          expression: ""
                        IfNameModify: false
                        module_type: action_type
                    total_count: 2
                    search_after:
                      - 5.0170403
                      - restart_pod
                检索行动类-非第一次请求:
                  value:
                    entries:
                      - id: restart_pod_test
                        name: 重启pod_test
                        tags:
                          - 拓扑架构
                        comment: "当pod状态是unknown或者failed时,重启pod"
                        icon: ""
                        color: ""
                        branch: main
                        detail: ""
                        creator: a0f02238-6cec-11f0-82bb-fa1c4529a151
                        create_time: 1758346280120
                        updater: a0f02238-6cec-11f0-82bb-fa1c4529a151
                        update_time: 1758346280120
                        kn_id: kn_system_incident_event_network
                        action_type: modify
                        action_intent: modify
                        object_type_id: pod
                        impact_contracts:
                          - object_type_id: pod
                            expected_operation: modify
                            description: 重启pod
                            affected_fields: []
                        object_type:
                          id: ""
                          name: ""
                          icon: ""
                          color: ""
                        condition:
                          object_type_id: pod
                          field: pod_status
                          operation: in
                          value_from: const
                          value:
                            - Unknown
                            - Failed
                        action_source:
                          type: tool
                          box_id: tool_123
                          tool_id: box_123
                        parameters:
                          - name: pod
                            value_from: property
                            value: pod_name
                          - name: namespace
                            value_from: property
                            value: pod_namespace
                          - name: cmd_type
                            value_from: input
                            value: ""
                        schedule:
                          type: ""
                          expression: ""
                        IfNameModify: false
                        module_type: action_type
                    search_after:
                      - 5.011528
                      - restart_pod_test
          description: "重载GET, 检索行动类"
        "201":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ID"
          description: ok
      summary: 创建或检索行动类
    parameters:
      - name: kn_id
        description: 业务知识网络ID
        schema:
          type: string
        in: path
        required: true
  /api/bkn-backend/v1/knowledge-networks/{kn_id}/action-types/{at_id}:
    put:
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateActionType"
        required: true
      parameters:
        - name: kn_id
          description: 业务知识网络ID
          schema:
            type: string
          in: path
          required: true
        - name: at_id
          description: 行动类ID
          schema:
            type: string
          in: path
          required: true
        - name: branch
          description: 分支，不填则使用 main 分支
          schema:
            type: string
          in: query
        - name: strict_mode
          description: 是否严格校验依赖，默认为 true。为 true 时校验绑定的对象类、影响对象类等是否存在；为 false 时不做该校验
          schema:
            type: boolean
            default: true
          in: query
        - name: validate_dependency
          deprecated: true
          description: "[已废弃] 请使用 strict_mode。兼容保留，strict_mode 为空时会读取此参数"
          schema:
            type: boolean
            default: true
          in: query
      responses:
        "204":
          description: ok
      summary: 修改行动类
    parameters:
      - name: kn_id
        description: 业务知识网络ID
        in: path
        required: true
      - name: at_id
        description: 行动类ID
        in: path
        required: true
  /api/bkn-backend/v1/knowledge-networks/{kn_id}/action-types/{at_ids}:
    get:
      parameters:
        - name: include_detail
          description: 是否包含说明书信息，默认false，不包含。
          schema:
            type: boolean
          in: query
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionTypeDetails"
          description: ok
      summary: 获取行动类详情
    delete:
      parameters:
        - name: kn_id
          description: 业务知识网络ID
          schema:
            type: string
          in: path
          required: true
        - name: at_ids
          description: 行动类ID
          schema:
            type: array
            items:
              type: string
          in: path
          required: true
      responses:
        "204":
          description: 删除成功
      summary: 删除行动类
    parameters:
      - name: kn_id
        description: 业务知识网络ID
        schema:
          type: string
        in: path
        required: true
      - name: at_ids
        description: 行动类ID
        schema:
          type: array
          items:
            type: string
        in: path
        required: true
  /api/bkn-backend/v1/knowledge-networks/{kn_id}/action-types/validation:
    post:
      summary: 校验行动类
      description: |
        仅校验行动类依赖存在性，不写库。校验绑定对象类、影响对象类等依赖是否存在。

        **响应**：HTTP 200 时 `valid`/`detail` 同其它 validate 接口；参数与鉴权错误为非 2xx。

        **内部接口**：`POST /api/bkn-backend/in/v1/.../action-types/validation` 与 `POST /api/ontology-manager/in/v1/.../action-types/validation`；Header 解析访问者，无 OAuth。
      parameters:
        - name: kn_id
          description: 业务知识网络ID
          schema:
            type: string
          in: path
          required: true
        - name: branch
          description: 分支，不填则使用 main 分支
          schema:
            type: string
          in: query
        - name: strict_mode
          description: 是否严格校验依赖，默认为 true
          schema:
            type: boolean
            default: true
          in: query
        - name: import_mode
          description: 与创建行动类接口一致；用于行动类 ID/名称与落库冲突的校验语义（normal / ignore / overwrite）。
          schema:
            type: string
            enum: [normal, ignore, overwrite]
            default: normal
          in: query
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                entries:
                  type: array
                  description: 待校验的行动类列表，结构与创建接口一致
                  items:
                    type: object
      responses:
        "200":
          description: 已返回校验结果（通过与否均可能为 200）
          content:
            application/json:
              schema:
                type: object
                required:
                  - valid
                properties:
                  valid:
                    type: boolean
                  detail:
                    type: string
                    description: 当 valid 为 false 时的说明（error.Error()）
        "400":
          description: 请求参数错误等；业务校验未通过见 200 + valid:false
components:
  schemas:
    BasicInfo:
      description: 资源的基本信息，包含id和名称
      required:
        - id
        - name
      type: object
      properties:
        id:
          description: 资源ID
          type: string
        name:
          description: 资源名称
          type: string
    ConceptTypeResponse:
      description: 对象类、关系类、行动类的查询返回结构
      required:
        - concept_type
        - id
        - name
        - tags
        - groups
      type: object
      properties:
        concept_type:
          description: 概念类型
          enum:
            - object_type
            - relation_type
            - action_type
          type: string
        id:
          description: 概念id
          type: string
        name:
          description: 概念名称
          type: string
        tags:
          description: 标签
          type: array
          items:
            type: string
        groups:
          description: 所属概念分组ID
          type: array
          items:
            type: string
    Object:
      description: json，字段不定
      type: object
    ExpectedImpactOperation:
      description: |
        契约中的预期操作语义；**与 `action_intent`、`action_type` 同一枚举**（add / modify / delete）。
        `impact_contracts[].expected_operation` 必填；`affect.expected_operation` 若填写则须合法。
      type: string
      enum:
        - add
        - modify
        - delete
    ImpactContractItem:
      description: |
        行动影响契约的单条声明（结构化元数据）；与运行时 JSON、`t_action_type.f_impact_contracts` 序列化形状一致。**平台据契约做完整性等校验但不将其当作执行编排依据。** 参阅 `docs/design/bkn/features/action_type_rebuild/DESIGN.md` §7。
      type: object
      properties:
        object_type_id:
          description: 受影响对象类 ID
          type: string
        expected_operation:
          $ref: "#/components/schemas/ExpectedImpactOperation"
        description:
          description: 可读说明（风险提示文案等）
          type: string
        affected_fields:
          description: 预期牵涉的数据属性名列表
          type: array
          items:
            type: string
    Affect:
      deprecated: true
      description: |
        **[已废弃]** 请使用 `impact_contracts`（`ImpactContractItem` 数组）声明影响面。仅存单行影响时的兼容写法仍可能被服务端接受并折合为一元数组。
        详见 `docs/design/bkn/features/action_type_rebuild/DESIGN.md` §5.9、§7.5。
      required: []
      type: object
      properties:
        comment:
          description: 影响描述
          type: string
        object_type_id:
          description: 影响的对象类ID
          type: string
        expected_operation:
          allOf:
            - $ref: "#/components/schemas/ExpectedImpactOperation"
          description: |
            若填写须为 add / modify / delete 之一（与行动类 `action_intent` 一致）。
            仅提交 `affect` 且服务端折行生成 `impact_contracts` 时，**仍以 `action_type` 写入契约行的 expected_operation**；本字段可省略。
        affected_fields:
          description: 预期牵涉的数据属性名列表（与 `impact_contracts[].affected_fields` 对齐）
          type: array
          items:
            type: string
    Schedule:
      description: 执行频率配置项
      required:
        - time_type
        - frequency
        - expression
        - type
      type: object
      properties:
        type:
          description: 执行类型。枚举，支持配置固定频率(FIX_RATE)和配置crontab表达式（CRON）
          enum:
            - FIX_RATE
            - CRON
          type: string
        expression:
          description: |-
            执行表达式。

            1.固定频率指以固定周期执行持久化，frequency=< time_durations >，用一个数字，后面跟时间单位来定义。时间单位可以是如下之一：m - 分钟； h - 小时； d - 天
          type: string
    ID:
      description: id
      required:
        - id
      type: object
      properties:
        id:
          description: id
          type: string
    Branch:
      description: 分支信息
      required:
        - base_version
        - comment
        - id
        - kn_id
        - name
        - tags
      type: object
      properties:
        id:
          description: 分支ID
          type: string
        name:
          description: 分支名称
          type: string
        tags:
          description: 标签
          type: array
          items:
            type: string
        comment:
          description: 备注
          type: string
        base_version:
          description: 来源版本
          type: string
        kn_id:
          description: 业务知识网络ID
          type: string
    ListActionTypes:
      description: 行动类列表
      required:
        - entries
        - total_count
      type: object
      properties:
        entries:
          description: 条目列表
          type: array
          items:
            $ref: "#/components/schemas/ActionType"
        total_count:
          description: 总条数
          type: integer
    ToolSource:
      description: 工具资源
      required:
        - type
        - tool_id
        - box_id
      type: object
      properties:
        type:
          description: 资源类型
          enum:
            - tool
          type: string
        box_id:
          description: 工具箱ID
          type: string
        tool_id:
          description: 工具ID
          type: string
    ConceptGroup:
      description: 概念分组
      required:
        - id
        - name
      type: object
      properties:
        id:
          description: 概念分组ID
          type: string
        name:
          description: 概念分组名称
          type: string
    SimpleObjectType:
      description: ""
      required:
        - id
        - name
        - icon
        - color
      type: object
      properties:
        id:
          description: 对象类id
          type: string
        name:
          description: 对象类名称
          type: string
        icon:
          description: 对象类图标
          type: string
        color:
          description: 对象类颜色
          type: string
    AffectDetail:
      deprecated: true
      description: |
        **[已废弃]** 列表/详情中为兼容回填的单行影响；推荐使用响应中的 `impact_contracts`。
        详见 `docs/design/bkn/features/action_type_rebuild/DESIGN.md` §7.5。
      required:
        - object_type
        - comment
        - object_type_id
      type: object
      properties:
        comment:
          description: 影响描述
          type: string
        object_type_id:
          description: 影响的对象类ID
          type: string
        expected_operation:
          allOf:
            - $ref: "#/components/schemas/ExpectedImpactOperation"
          description: 若存在须为合法枚举（与 `action_intent` / `action_type` 一致）。
        affected_fields:
          description: 预期牵涉的数据属性名列表
          type: array
          items:
            type: string
        object_type:
          $ref: "#/components/schemas/SimpleObjectType"
          description: 对象类信息
    override:
      oneOf:
        - type: object
        - $ref: "#/components/schemas/ReqActionTypes"
        - $ref: "#/components/schemas/override--get"
      discriminator:
        mapping:
          x-http-method-override:POST: "#/components/schemas/ReqActionTypes"
          x-http-method-override:GET: "#/components/schemas/override--get"
        propertyName: x-http-method-override
      description: post 重载批量创建、行动类检索接口
      type: object
    override--get:
      oneOf:
        - $ref: "#/components/schemas/FirstQueryWithSearchAfter"
        - $ref: "#/components/schemas/PageTurnQueryWithSearchAfter"
      description: 行动类检索请求体
      type: object
    Sort:
      description: 排序字段。默认按 _score 倒序排序
      required:
        - field
        - direction
      type: object
      properties:
        field:
          description: 排序字段
          type: string
        direction:
          description: 排序方向
          enum:
            - desc
            - asc
          type: string
    ActionTypeSearchResponse:
      description: 行动类检索返回结果
      required:
        - groups
        - type
        - entries
        - search_after
      type: object
      properties:
        entries:
          description: 对象实例数据
          type: array
          items:
            $ref: "#/components/schemas/ActionTypeDetail"
        total_count:
          description: 总条数
          type: integer
        search_after:
          description: 表示返回的最后一个文档的排序值，获取这个用于下一次 search_after 分页。
          type: array
          items: {}
    Parameter:
      description: 工具参数
      required:
        - name
        - value_from
      type: object
      properties:
        name:
          description: 参数名称
          type: string
        type:
          description: 参数类型
          type: string
        source:
          description: 参数来源
          type: string
        value_from:
          description: 值来源
          enum:
            - property
            - input
            - const
          type: string
        value:
          description: 参数值。value_from=property时，填入的是对象类的数据属性名称；value_from=input时，不设置此字段
          type: string
    ActionTypeDetails:
      description: 行动类详情
      required:
        - entries
      type: object
      properties:
        entries:
          description: 行动类详情
          type: array
          items:
