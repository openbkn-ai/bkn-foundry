openapi: 3.0.3
info:
  title: BKN Backend API
  description: |
    BKN (Business Knowledge Network) Backend API 提供了业务知识网络的导入导出功能。
  version: 1.0.0
  contact:
    name: BKN Foundry Team

servers:
  - url: http://localhost:13014
    description: Local development server

security:
  - OAuth2: []
  - InternalAuth: []

tags:
  - name: BKN Import/Export
    description: BKN 导入导出接口

paths:
  # ==================== BKN Import/Export ====================
  /api/bkn-backend/v1/bkns:
    post:
      tags:
        - BKN Import/Export
      summary: 上传 BKN tar 包并导入
      description: 上传 BKN tar 包文件并导入为业务知识网络，tar 包内容格式参考 docs/design/bkn/features/bkn_docs/SPECIFICATION.md
      operationId: uploadBKN
      security:
        - OAuth2: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: BKN tar 包文件
            encoding:
              file:
                contentType: application/octet-stream
      parameters:
        - name: branch
          in: query
          description: 分支名称，默认为 main
          schema:
            type: string
            default: main
        - name: X-Business-Domain
          in: header
          required: true
          description: 业务域
          schema:
            type: string
      responses:
        '200':
          description: 导入成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  kn_id:
                    type: string
                    description: 创建的知识网络 ID
        '400':
          description: 请求参数错误
        '401':
          description: 未授权

  /api/bkn-backend/v1/bkns/{kn_id}:
    get:
      tags:
        - BKN Import/Export
      summary: 下载 BKN tar 包
      description: 导出业务知识网络为 BKN tar 包文件，tar 包内容格式参考 docs/design/bkn/features/bkn_docs/SPECIFICATION.md
      operationId: downloadBKN
      security:
        - OAuth2: []
      parameters:
        - name: kn_id
          in: path
          required: true
          description: 知识网络 ID
          schema:
            type: string
        - name: branch
          in: query
          description: 分支名称，默认为 main
          schema:
            type: string
            default: main
      responses:
        '200':
          description: 导出成功
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '400':
          description: 请求参数错误
        '401':
          description: 未授权
        '404':
          description: 知识网络不存在
  /api/bkn-backend/v1/knowledge-networks/names:
    post:
      tags:
        - BKN
      summary: 按 ID 批量取知识网络名称
      description: "按 ID 批量回显知识网络名称（用于对象级授权页等）。不存在的 ID 略过，不报错。需 `Content-Type: application/json`。"
      operationId: queryKNNamesByIDs
      security:
        - OAuth2: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ids:
                  type: array
                  description: 待取名的知识网络 ID 列表，空列表返回空 entries
                  items:
                    type: string
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  entries:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
        '400':
          description: 请求参数错误
          content:
            application/json:
              schema:
                $ref: "../_shared/errors.yaml#/components/schemas/Error"
        '401':
          description: 未授权
  /api/bkn-backend/v1/resources:
    get:
      tags:
        - BKN
      summary: 列出资源
      description: 按资源类型分页列出资源（统一资源平台）。当前支持 `resource_type=kn`（知识网络）。
      operationId: listResources
      security:
        - OAuth2: []
      parameters:
        - name: resource_type
          in: query
          required: true
          description: 资源类型，如 `kn`
          schema:
            type: string
        - name: keyword
          in: query
          description: 名称关键字过滤，默认空
          schema:
            type: string
        - name: offset
          in: query
          description: 偏移量，默认 0
          schema:
            type: integer
            format: int64
            default: 0
        - name: limit
          in: query
          description: 每页条数，默认 10
          schema:
            type: integer
            format: int64
            default: 10
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  entries:
                    type: array
                    items:
                      type: object
                      properties:
                        type:
                          type: string
                        id:
                          type: string
                        name:
                          type: string
                  total_count:
                    type: integer
                    format: int64
        '400':
          description: 请求参数错误
          content:
            application/json:
              schema:
                $ref: "../_shared/errors.yaml#/components/schemas/Error"
        '401':
          description: 未授权

components:
  securitySchemes:
    OAuth2:
      type: oauth2
      description: OAuth2 认证，用于外网接口
      flows:
        clientCredentials:
          tokenUrl: /oauth2/token
          scopes: {}