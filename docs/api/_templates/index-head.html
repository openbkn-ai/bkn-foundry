<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BKN Foundry API 文档中心</title>
<style>
  :root{--bg:#fff;--fg:#12212b;--muted:#5b6b78;--nav:#f7f9fb;--line:#e4eaf0;--acc:#0e7c86;--acc-bg:#e1f3f4}
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:var(--bg);color:var(--fg);font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  .layout{display:flex;height:100vh;overflow:hidden}
  /* 左侧导航 */
  .nav{width:290px;flex:0 0 290px;background:var(--nav);border-right:1px solid var(--line);display:flex;flex-direction:column;height:100vh}
  .nav-head{padding:20px 20px 12px;border-bottom:1px solid var(--line)}
  .nav-head img{height:30px;width:auto;display:block;margin-bottom:12px}
  .nav-head .search{width:100%;padding:8px 11px;font-size:14px;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--fg);outline:none}
  .nav-head .search:focus{border-color:var(--acc)}
  .nav-head .auth-link{display:inline-block;margin-top:10px;font-size:13px;color:var(--acc);text-decoration:none}
  .nav-head .auth-link:hover{text-decoration:underline}
  .nav-body{flex:1;overflow-y:auto;padding:10px 10px 40px}
  .mod{margin:6px 0 4px}
  .mod-title{display:flex;align-items:center;gap:7px;padding:8px 10px 4px;font-weight:600;font-size:12px;letter-spacing:.03em;text-transform:uppercase;color:var(--muted)}
  .mod-title .count{font-weight:600;font-size:11px;color:var(--acc);background:var(--acc-bg);padding:1px 7px;border-radius:20px}
  .mod-desc{padding:0 10px 6px;font-size:12px;color:var(--muted)}
  .res{display:block;padding:6px 12px;margin:1px 0;border-radius:7px;color:var(--fg);text-decoration:none;font-size:14px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .res:hover{background:#e8edf3}
  .res.active{background:var(--acc);color:#fff;font-weight:600}
  .no-hit{padding:12px;color:var(--muted);font-size:13px;display:none}
  /* 右侧内容 */
  .content{flex:1;height:100vh;display:flex;flex-direction:column}
  .content iframe{border:0;width:100%;height:100%;background:#fff}
  .welcome{margin:auto;max-width:440px;text-align:center;color:var(--muted);padding:40px}
  .welcome h1{font-size:22px;color:var(--fg);margin:0 0 8px}
  .welcome p{font-size:14px}
  @media(max-width:720px){.nav{width:230px;flex-basis:230px}}
</style>
</head>
<body>
<div class="layout">
  <aside class="nav">
    <div class="nav-head">
      <img src="./openbkn-logo.png" alt="OpenBKN">
      <input class="search" id="q" type="search" placeholder="过滤资源…" autocomplete="off">
      <a class="auth-link" href="./auth.html" target="cdoc">🔑 认证说明 &rarr;</a>
    </div>
    <nav class="nav-body" id="navbody">
