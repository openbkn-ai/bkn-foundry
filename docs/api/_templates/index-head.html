<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BKN Foundry API 文档中心</title>
<style>
  :root{--bg:#fff;--fg:#12212b;--muted:#5b6b78;--card:#fff;--line:#e4eaf0;--acc:#0e7c86;--acc-bg:#e1f3f4;--shadow:0 1px 2px rgba(16,32,44,.04),0 3px 12px rgba(16,32,44,.06)}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--fg);font:16px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  .wrap{max-width:960px;margin:0 auto;padding:56px 24px 96px}
  header .logo{height:40px;width:auto;display:block;margin:0 0 20px}
  header h1{font-size:30px;letter-spacing:-.02em;margin:0 0 8px}
  header p{color:var(--muted);font-size:16px;margin:0 0 24px}
  .search{width:100%;max-width:420px;padding:10px 14px;font-size:15px;border:1px solid var(--line);border-radius:10px;background:var(--card);color:var(--fg);outline:none}
  .search:focus{border-color:var(--acc)}
  .auth{margin:18px 0 8px}
  .auth a{display:inline-block;font-size:14px;color:var(--acc);text-decoration:none;border:1px solid var(--line);border-radius:8px;padding:8px 14px}
  .auth a:hover{border-color:var(--acc)}
  .mod{margin:34px 0 0}
  .mod-h{display:flex;align-items:baseline;gap:12px;margin:0 0 4px}
  .mod-h h2{font-size:20px;margin:0}
  .mod-h .count{font:600 12px system-ui;color:var(--acc);background:var(--acc-bg);padding:2px 9px;border-radius:20px}
  .mod-desc{color:var(--muted);font-size:14px;margin:0 0 16px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px}
  .card{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:var(--card);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);text-decoration:none;color:inherit;transition:transform .12s,border-color .12s}
  .card:hover{transform:translateY(-2px);border-color:var(--acc)}
  .card .name{font-weight:600;font-size:15px}
  .card .arrow{color:var(--acc);margin-left:8px}
  .no-hit{color:var(--muted);font-size:14px;display:none;margin-top:20px}
</style>
</head>
<body>
<div class="wrap">
<header>
  <img class="logo" src="./openbkn-logo.png" alt="OpenBKN">
  <h1>BKN Foundry API 文档中心</h1>
  <p>各服务的 OpenAPI 交互式文档 —— 点开任意资源查看端点、参数与示例（新标签页打开）。</p>
  <input class="search" id="q" type="search" placeholder="过滤资源…" autocomplete="off">
  <div class="auth"><a href="./auth.html" target="_blank" rel="noopener">🔑 认证说明 · 如何获取并携带 Token &rarr;</a></div>
</header>
<main id="list">
