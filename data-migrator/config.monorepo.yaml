# config.monorepo.yaml — data-migrator config for the bkn-foundry monorepo.
#
# Build-time flow:
#   The consolidated SQL at the repo root (migrations/<service>/<db_type>/<version>/)
#   is copied straight into the image as /app/repos by the Dockerfile — no collect
#   step, no copy_repos.py, no git fetch / PAT at runtime.
#
# Runtime flow (chart pre-install Job):
#   python3 server/data-migrator.py migrate \
#     --config /app/config.yaml \
#     --secret-config /etc/data-migrator/secret-config.yaml
#
# The runtime keys off the service name to locate repos/<service>/<db_type>/<version>/.
# `path` is only consumed by the git-based `fetch` mode (unused in monorepo builds);
# it is kept here to document each service's source location under the repo root.

module: openbkn
description: bkn-foundry data-migrator config (monorepo edition)

db_types:
  - mariadb

# Logical databases the migrator must pre-create.
databases:
  - openbkn
  - safe # bkn-safe（ISF 替代鉴权服务）库；schema 由 bkn-safe 启动时 GORM AutoMigrate 建表，但库本身需 migrator 预建，否则首装报 Unknown database 'safe'

check_rules:
  check_type: 3 # CheckLatest = 1, CheckRecently = 2, CheckAll = 3
  allow_none_primary_key: false
  allow_foreign_key: false
  allow_python_exception: true

renamed_services:

services:
  # ---- adp ----
  bkn-backend:
    path: migrations/bkn-backend
  vega-backend:
    path: migrations/vega-backend
  agent-operator-integration:
    path: migrations/agent-operator-integration

  # ---- infra ----
  mf-model-manager:
    path: migrations/mf-model-manager
  oss-gateway-backend:
    path: migrations/oss-gateway-backend
  sandbox:
    path: migrations/sandbox
  # sandbox_control_plane/scripts/migrations uses its own python migration
  # runner (single .py file, not <db_type>/<version>/init.sql layout) and is
  # intentionally excluded from data-migrator.
