# Static install-status endpoint: a tiny nginx serving a human dashboard at
# GET /install-status and the raw non-sensitive JSON at GET /install-status.json.
#
# Two ConfigMaps back it (NOT in this file — created by status.sh so the HTML /
# nginx conf stay as real, un-escaped files, and the data refreshes per install):
#   - install-status-nginx : nginx.conf + index.html  (from conf/install-status/)
#   - install-status-data  : install-status.json      (regenerated each install)
# nginx reads the mounted files per request, so a data refresh needs no restart.
#
# A "refresher" sidecar (kubectl) regenerates LIVE snapshots every ${INTERVAL}s
# into a shared volume:
#   - /install-status.pods.json      raw `kubectl get pods -o json`
#   - /install-status.workloads.json raw `kubectl get deploy,sts -o json` — the
#     dashboard overlays per-release readiness and service health from it, so
#     the whole page tracks reality without re-running publish-status.
# It needs a ServiceAccount with a minimal Role (pods/deployments/statefulsets
# read only — NO secrets, NO helm). The rich version/drift/dep snapshot
# (install-status.json) stays as the externally-collected, publish-time data.
#
# Placeholders __NAMESPACE__ / __INGRESS_CLASS__ / __KUBECTL_IMAGE__ are
# substituted by status.sh.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: install-status
  namespace: __NAMESPACE__
  labels:
    app: install-status
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: install-status
  namespace: __NAMESPACE__
  labels:
    app: install-status
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: install-status
  namespace: __NAMESPACE__
  labels:
    app: install-status
subjects:
  - kind: ServiceAccount
    name: install-status
    namespace: __NAMESPACE__
roleRef:
  kind: Role
  name: install-status
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: install-status
  namespace: __NAMESPACE__
  labels:
    app: install-status
spec:
  replicas: 1
  selector:
    matchLabels:
      app: install-status
  template:
    metadata:
      labels:
        app: install-status
    spec:
      serviceAccountName: install-status
      containers:
        - name: refresher
          # kubectl image WITH a shell — distroless kubectl images (e.g.
          # rancher/kubectl) have no /bin/sh and won't start the loop.
          image: __KUBECTL_IMAGE__
          command: ["/bin/sh", "-c"]
          args:
            - |
              while true; do
                kubectl get pods -n "__NAMESPACE__" -o json > /live/pods.json.tmp 2>/live/err.log \
                  && mv /live/pods.json.tmp /live/pods.json
                kubectl get deploy,sts -n "__NAMESPACE__" -o json > /live/workloads.json.tmp 2>>/live/err.log \
                  && mv /live/workloads.json.tmp /live/workloads.json
                sleep "${INTERVAL:-60}"
              done
          env:
            - name: INTERVAL
              value: "60"
          resources:
            requests:
              cpu: 5m
              memory: 24Mi
            limits:
              cpu: 100m
              memory: 96Mi
          volumeMounts:
            - name: live
              mountPath: /live
        - name: nginx
          image: swr.cn-east-3.myhuaweicloud.com/openbkn-ai/library/nginx:1.27-alpine
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 2
            periodSeconds: 10
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
          volumeMounts:
            - name: conf
              mountPath: /etc/nginx/conf.d
            - name: web
              mountPath: /web
            - name: data
              mountPath: /data
            - name: live
              mountPath: /live
      volumes:
        - name: conf
          configMap:
            name: install-status-nginx
            items:
              - key: nginx.conf
                path: default.conf
        - name: web
          configMap:
            name: install-status-nginx
            items:
              - key: index.html
                path: index.html
        - name: data
          configMap:
            name: install-status-data
            optional: true
        - name: live
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: install-status
  namespace: __NAMESPACE__
  labels:
    app: install-status
spec:
  selector:
    app: install-status
  ports:
    - name: http
      port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: install-status
  namespace: __NAMESPACE__
  labels:
    app: install-status
spec:
  ingressClassName: __INGRESS_CLASS__
  rules:
    - http:
        paths:
          - path: /install-status
            pathType: Exact
            backend:
              service:
                name: install-status
                port:
                  number: 80
          - path: /install-status.json
            pathType: Exact
            backend:
              service:
                name: install-status
                port:
                  number: 80
          - path: /install-status.pods.json
            pathType: Exact
            backend:
              service:
                name: install-status
                port:
                  number: 80
          - path: /install-status.workloads.json
            pathType: Exact
            backend:
              service:
                name: install-status
                port:
                  number: 80
