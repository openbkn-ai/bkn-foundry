server {
  listen 80;
  server_name _;

  # Human-facing dashboard.
  location = /install-status {
    default_type text/html;
    charset utf-8;
    add_header Cache-Control "no-store";
    alias /web/index.html;
  }

  # Raw non-sensitive JSON snapshot (the dashboard fetches this).
  location = /install-status.json {
    default_type application/json;
    charset utf-8;
    add_header Cache-Control "no-store";
    alias /data/install-status.json;
  }

  # Live pod-health snapshot, regenerated in-cluster by the refresher sidecar
  # every ${INTERVAL}s (raw `kubectl get pods -o json`). The dashboard polls it.
  location = /install-status.pods.json {
    default_type application/json;
    charset utf-8;
    add_header Cache-Control "no-store";
    alias /live/pods.json;
  }

  location = /healthz {
    default_type text/plain;
    return 200 'ok';
  }
}
