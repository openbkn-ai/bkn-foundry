namespace: openbkn
replicaCount: 1
mode: Community
env:
  language: en_US.UTF-8
  timezone: Asia/Shanghai
image:
  registry: ghcr.io/openbkn-ai
# ISF replacement: route service authz + directory lookups to bkn-safe (the ISF
# stack is retired post-cutover). bkn-safe now installs into the same namespace as
# the core services, so url uses the namespace-agnostic short service name. To roll
# back to ISF, blank these three.
bknSafe:
  authzProvider: bkn-safe
  directoryProvider: bkn-safe
  url: http://bkn-safe:3000
# accessAddress: sudo deploy.sh writes the real URL to $HOME/.openbkn-ai/config.yaml by default.
# This file is an in-repo template. Leave host empty so onboard can auto-detect primary IPv4 when
# CONFIG_YAML_PATH points here (e.g. ubuntu user without overriding CONFIG_YAML_PATH).
accessAddress:
  host: ""
  port: 443
  scheme: https
  path: /
depServices:
  mq:
    auth:
      mechanism: 'PLAIN'
      username: 'kafkauser'
      password: ''
    mqHost: 'kafka.resource.svc.cluster.local'
    mqLookupdHost: ""
    mqLookupdPort: 0
    mqPort: 9092
    mqType: kafka
  opensearch:
    distribution: opensearch
    host: 'opensearch-cluster-master.resource.svc.cluster.local'
    user: 'admin'
    password: ''
    port: 9200
    protocol: https
    version: ""
  mongodb:
    source_type: internal
    host: 'mongodb.resource.svc.cluster.local'
    port: 28000
    user: 'admin'
    password: ''
    replicaSet: 'rs0'
    options:
      authSource: 'admin'
  rds:
    admin_key: ''
    host: 'mariadb.resource.svc.cluster.local'
    hostRead: 'mariadb.resource.svc.cluster.local'
    port: 3306
    portRead: 3306
    source_type: internal
    type: MariaDB
    user: 'adp'
    password: 'adp@123456'
    database: 'adp'
  redis:
    connectInfo:
      masterGroupName: mymaster
      password: ''
      sentinelHost: redis-sentinel.resource.svc.cluster.local
      sentinelPassword: ''
      sentinelPort: 26379
      sentinelUsername: root
      username: root
    connectType: sentinel
    sourceType: internal
  structure-extractor:
    privateHost: 127.0.0.1
    privatePort: 8089
    outputDir: /output
    backend: vlm-http-client
    serverUrl: http://127.0.0.1:8089
    fileHost: 127.0.0.1
    filePort: 8090
  class-443:
    ingressClass: nginx
