  # ISF replacement (now the default auth path): bkn-safe (authn/authz/directory)
  # bundles upstream ORY Hydra (token engine) + its PostgreSQL (persisted on a
  # PVC) and, for pure dev, a MariaDB app DB. With a cluster depServices.rds set,
  # the app DB uses the shared cluster MariaDB instead. Services route to bkn-safe
  # via config.yaml bknSafe.* ; hydra's browser URLs (issuer/login/consent/device)
  # derive from accessAddress; its ingress exposes /oauth2/*, /.well-known/*,
  # /userinfo at the gateway. (The standalone `hydra` chart is NOT a release here —
  # bkn-safe's bundledDeps provides hydra to avoid a double deploy.)
  etcd:
    image: registry.aliyuncs.com/google_containers/etcd
    tag: 3.5.15-0
