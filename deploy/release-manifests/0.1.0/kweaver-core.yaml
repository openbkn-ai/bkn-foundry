apiVersion: deploy.kweaver.ai/v1alpha1
kind: VersionSet
product: kweaver-core
version: 0.1.0
source:
  type: oci
  registry: oci://ghcr.io/kowell-ai/charts
dependencies:
- product: isf
  version: 0.8.0
  manifest: ./isf.yaml
  optional: true
  defaultEnabled: true
  enabledIf: auth.enabled
releases:
