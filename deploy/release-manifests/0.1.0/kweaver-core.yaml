    version: 0.1.0
  sandbox:
    chart: sandbox
    version: 0.1.0
  bkn-backend:
    chart: bkn-backend
    version: 0.1.0
  ontology-query:
    chart: ontology-query
    version: 0.1.0
  vega-backend:
    chart: vega-backend
    version: 0.1.0
  kafka-connect:
    chart: kafka-connect
    version: 0.1.0
  agent-operator-integration:
    chart: agent-operator-integration
    version: 0.1.0
  agent-retrieval:
    chart: agent-retrieval
    version: 0.1.0
  agent-backend:
    chart: agent-backend
    version: 0.1.0
  dataflow:
    chart: dataflow
    version: 0.1.0
  coderunner:
    chart: coderunner
    version: 0.1.0
  doc-convert:
    chart: doc-convert
    version: 0.1.0
  agent-observability:
    chart: agent-observability
    version: 0.1.0
  otelcol-contrib:
    chart: otelcol-contrib
    version: 0.1.0
