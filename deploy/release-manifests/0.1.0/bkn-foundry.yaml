apiVersion: deploy.openbkn.ai/v1alpha1
kind: VersionSet
product: bkn-foundry
version: 0.1.0
source:
  type: oci
  registry: oci://ghcr.io/openbkn-ai/charts
# Auth/identity is provided by bkn-safe (authn/authz/directory) + ORY Hydra,
# deployed as releases below. The legacy ISF stack has been fully retired.
releases:
  core-data-migrator:
    chart: core-data-migrator
    version: 0.1.0
    stage: pre
  mf-model-manager:
    chart: mf-model-manager
    version: 0.1.0
  mf-model-api:
    chart: mf-model-api
    version: 0.1.0
  oss-gateway-backend:
    chart: oss-gateway-backend
    version: 0.1.0
  sandbox:
    chart: sandbox
    version: 0.1.0
  bkn-backend:
    chart: bkn-backend
    version: 0.1.0
  ontology-query:
    chart: ontology-query
    version: 0.1.0
  vega-backend:
    chart: vega-backend
    version: 0.1.0
  kafka-connect:
    chart: kafka-connect
    version: 0.1.0
  agent-operator-integration:
    chart: agent-operator-integration
    version: 0.1.0
  agent-retrieval:
    chart: agent-retrieval
    version: 0.1.0
  agent-observability:
    chart: agent-observability
    version: 0.1.0
  otelcol-contrib:
    chart: otelcol-contrib
    version: 0.1.0
  # ISF replacement (now the default auth path): bkn-safe (authn/authz/directory)
  # bundles upstream ORY Hydra (token engine) + its PostgreSQL (persisted on a
  # PVC) and, for pure dev, a MariaDB app DB. With a cluster depServices.rds set,
  # the app DB uses the shared cluster MariaDB instead. Services route to bkn-safe
  # via config.yaml bknSafe.* ; hydra's browser URLs (issuer/login/consent/device)
  # derive from accessAddress; its ingress exposes /oauth2/*, /.well-known/*,
  # /userinfo at the gateway. (The standalone `hydra` chart is NOT a release here —
  # bkn-safe's bundledDeps provides hydra to avoid a double deploy.)
  bkn-safe:
    chart: bkn-safe
    version: 0.1.0
